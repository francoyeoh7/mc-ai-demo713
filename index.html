<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>MC AI Demo</title>
<style>
:root{
  --mc-green:#5eb04a;
  --mc-dirt:#8b5a2b;
  --mc-stone:#7a7a7a;
  --mc-wood:#6b4a2a;
  --panel-bg:rgba(20,22,28,0.88);
  --panel-border:rgba(255,255,255,0.14);
  --accent:#7ed957;
  --accent-2:#4fc3f7;
  --warn:#ffb74d;
  --danger:#ef5350;
}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:#eee;touch-action:none;overscroll-behavior:none;}
#app{position:fixed;inset:0;overflow:hidden;}
canvas{display:block;width:100%;height:100%;touch-action:none;}

/* Loading */
#loading{position:fixed;inset:0;background:#0a0e14;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:opacity .5s;}
#loading .logo{font-size:22px;font-weight:700;letter-spacing:4px;color:var(--accent);text-shadow:0 0 12px rgba(126,217,87,.5);margin-bottom:18px;}
#loading .bar{width:200px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#loading .bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .3s;border-radius:3px;}
#loading .tip{margin-top:12px;font-size:11px;color:#888;letter-spacing:1px;}

/* Orientation hint (portrait) */
#rotate-hint{position:fixed;inset:0;background:#0a0e14;z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;color:#ccc;font-size:14px;letter-spacing:1px;}
#rotate-hint .icon{width:60px;height:90px;border:3px solid #7ed957;border-radius:8px;margin-bottom:16px;position:relative;animation:rot 1.6s infinite ease-in-out;}
@keyframes rot{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media (orientation:portrait){#rotate-hint{display:flex;}}

/* Joystick */
#joystick{position:fixed;left:24px;bottom:24px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.18);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:20;touch-action:none;}
#joystick .knob{position:absolute;left:50%;top:50%;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f0f0f0,#a0a0a0);border:2px solid rgba(0,0,0,.3);transform:translate(-50%,-50%);box-shadow:0 4px 10px rgba(0,0,0,.4);pointer-events:none;}

/* Jump button */
#jump-btn{position:fixed;right:24px;bottom:32px;width:88px;height:88px;border-radius:50%;background:rgba(126,217,87,.18);border:2px solid rgba(126,217,87,.55);color:#dfffcc;font-size:14px;font-weight:600;letter-spacing:2px;z-index:20;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);touch-action:none;}
#jump-btn:active{background:rgba(126,217,87,.35);}

/* Crosshair (center, tiny) */
#center-cross{position:fixed;left:50%;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);pointer-events:none;z-index:15;opacity:.55;}
#center-cross::before,#center-cross::after{content:"";position:absolute;background:#fff;box-shadow:0 0 2px rgba(0,0,0,.9);}
#center-cross::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%);}
#center-cross::after{left:0;top:50%;width:100%;height:2px;transform:translateY(-50%);}

/* AI Ball button */
#ai-ball{position:fixed;top:16px;right:16px;width:64px;height:64px;border-radius:50%;z-index:40;background:linear-gradient(135deg,#4fc3f7,#1976d2);border:2px solid rgba(255,255,255,.5);box-shadow:0 6px 18px rgba(30,140,220,.5),inset 0 0 12px rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;letter-spacing:1px;font-family:"Courier New",monospace;transition:transform .2s,box-shadow .3s,background .3s;touch-action:none;}
#ai-ball .core{position:relative;z-index:2;}
#ai-ball .ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid transparent;}
#ai-ball .badge{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:#ef5350;border:2px solid #fff;display:none;box-shadow:0 0 8px rgba(239,83,80,.9);}
#ai-ball.has-history .badge{display:block;}
#ai-ball.dragging{background:linear-gradient(135deg,#ffb74d,#f57c00);box-shadow:0 0 22px rgba(255,183,77,.8),inset 0 0 12px rgba(255,255,255,.3);transform:scale(1.08);}
#ai-ball.thinking{background:linear-gradient(135deg,#ba68c8,#6a1b9a);}
#ai-ball.thinking .ring{border-top-color:#fff;border-right-color:#fff;animation:spin 1s linear infinite;}
#ai-ball.output{background:linear-gradient(135deg,#7ed957,#388e3c);}
@keyframes spin{to{transform:rotate(360deg);}}

/* Drag crosshair (above finger) */
#drag-cross{position:fixed;width:56px;height:56px;pointer-events:none;z-index:38;display:none;transform:translate(-50%,-50%);}
#drag-cross svg{width:100%;height:100%;filter:drop-shadow(0 0 6px rgba(255,220,80,.9));}

/* Voice bubble */
#voice-bubble{position:fixed;top:14px;left:50%;transform:translateX(-50%);max-width:60%;padding:10px 18px;border-radius:22px;background:rgba(0,0,0,.72);border:1px solid rgba(126,217,87,.5);color:#eaffd6;font-size:14px;line-height:1.4;z-index:45;display:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);text-align:center;}
#voice-bubble .mic{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef5350;margin-right:8px;vertical-align:middle;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.35);}}
#voice-bubble .txt{vertical-align:middle;}

/* Block name label */
#block-label{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%);padding:6px 14px;background:rgba(0,0,0,.78);border:1px solid rgba(255,220,80,.7);color:#fff8d0;border-radius:6px;font-size:15px;font-weight:600;letter-spacing:1px;z-index:37;display:none;pointer-events:none;text-shadow:0 1px 2px #000;}

/* Output panel */
#output-panel{position:fixed;top:92px;right:14px;width:280px;max-width:44vw;max-height:60vh;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:12px;z-index:42;padding:14px;color:#eee;font-size:13px;line-height:1.5;overflow-y:auto;display:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(0,0,0,.5);}
#output-panel h3{font-size:14px;color:var(--accent);margin-bottom:6px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
#output-panel h3 .dot{width:8px;height:8px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);}
#output-panel .desc{color:#cfd8dc;margin-bottom:10px;}
#output-panel .meta{padding-top:8px;margin-top:8px;border-top:1px dashed rgba(255,255,255,.15);color:#90a4ae;font-size:11px;line-height:1.6;}
#output-panel .meta b{color:#e0e0e0;font-weight:600;}
#output-panel .hint{margin-top:10px;font-size:10px;color:#78909c;letter-spacing:.5px;text-align:center;padding-top:6px;border-top:1px dashed rgba(255,255,255,.08);}

/* History panel */
#history-panel{position:fixed;top:92px;right:14px;width:300px;max-width:46vw;max-height:65vh;background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:12px;z-index:42;padding:14px;color:#eee;font-size:12px;overflow-y:auto;display:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 8px 24px rgba(0,0,0,.5);}
#history-panel h3{font-size:14px;color:var(--accent-2);margin-bottom:10px;letter-spacing:1px;display:flex;justify-content:space-between;align-items:center;}
#history-panel h3 .close{background:none;border:1px solid rgba(255,255,255,.2);color:#ccc;width:24px;height:24px;border-radius:50%;font-size:14px;line-height:1;}
#history-panel .item{padding:8px;border-radius:6px;background:rgba(255,255,255,.04);margin-bottom:8px;border-left:2px solid var(--accent-2);}
#history-panel .item .name{color:var(--accent);font-weight:600;margin-bottom:3px;font-size:13px;}
#history-panel .item .q{color:#b0bec5;font-size:11px;margin-bottom:3px;}
#history-panel .item .d{color:#cfd8dc;font-size:11px;line-height:1.5;}
#history-panel .empty{color:#78909c;text-align:center;padding:20px;font-size:11px;}

/* Hint text */
#hint{position:fixed;left:12px;top:12px;font-size:10px;color:rgba(255,255,255,.5);z-index:10;line-height:1.5;letter-spacing:.5px;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.8);}
#hint b{color:var(--accent);}

/* FPS mini */
#fps{position:fixed;right:14px;top:88px;font-size:10px;color:rgba(255,255,255,.35);z-index:5;font-family:monospace;display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="logo">M C · A I</div>
    <div class="bar"><span id="load-bar"></span></div>
    <div class="tip" id="load-tip">正在生成方块世界...</div>
  </div>

  <div id="rotate-hint">
    <div class="icon"></div>
    <div>请横屏使用</div>
  </div>

  <div id="hint">
    左侧摇杆移动 · 右侧滑动看视角 · <b>长按右上助手拖到方块</b><br>
    松手后晃动视角关闭输出 · 点击助手看历史
  </div>

  <div id="center-cross"></div>

  <div id="joystick"><div class="knob" id="joy-knob"></div></div>
  <button id="jump-btn">JUMP</button>

  <div id="ai-ball">
    <div class="ring"></div>
    <div class="core">AI</div>
    <div class="badge"></div>
  </div>

  <div id="drag-cross">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="30" fill="none" stroke="#ffdc50" stroke-width="3"/>
      <circle cx="50" cy="50" r="4" fill="#ffdc50"/>
      <line x1="50" y1="10" x2="50" y2="34" stroke="#ffdc50" stroke-width="3"/>
      <line x1="50" y1="66" x2="50" y2="90" stroke="#ffdc50" stroke-width="3"/>
      <line x1="10" y1="50" x2="34" y2="50" stroke="#ffdc50" stroke-width="3"/>
      <line x1="66" y1="50" x2="90" y2="50" stroke="#ffdc50" stroke-width="3"/>
    </svg>
  </div>

  <div id="voice-bubble"><span class="mic"></span><span class="txt" id="voice-txt">正在聆听...</span></div>

  <div id="block-label"></div>

  <div id="output-panel">
    <h3><span class="dot"></span><span id="out-name">方块</span></h3>
    <div class="desc" id="out-desc"></div>
    <div class="meta" id="out-meta"></div>
    <div class="hint">左右快速晃动视角关闭 ↔</div>
  </div>

  <div id="history-panel">
    <h3><span>对话历史</span><button class="close" id="hist-close">×</button></h3>
    <div id="hist-list"></div>
  </div>

  <div id="fps">0</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
<script type="module" id="main-script">

import * as THREE from 'three';

// ==============================================================
// DOM refs
// ==============================================================
const app        = document.getElementById('app');
const loadingEl  = document.getElementById('loading');
const loadBar    = document.getElementById('load-bar');
const loadTip    = document.getElementById('load-tip');
const joystick   = document.getElementById('joystick');
const joyKnob    = document.getElementById('joy-knob');
const jumpBtn    = document.getElementById('jump-btn');
const aiBall     = document.getElementById('ai-ball');
const dragCross  = document.getElementById('drag-cross');
const voiceBubble= document.getElementById('voice-bubble');
const voiceTxt   = document.getElementById('voice-txt');
const blockLabel = document.getElementById('block-label');
const outputPanel= document.getElementById('output-panel');
const outName    = document.getElementById('out-name');
const outDesc    = document.getElementById('out-desc');
const outMeta    = document.getElementById('out-meta');
const historyPanel=document.getElementById('history-panel');
const histList   = document.getElementById('hist-list');
const histClose  = document.getElementById('hist-close');
const fpsEl      = document.getElementById('fps');

const setLoad = (p, tip)=>{ loadBar.style.width=(p*100)+'%'; if(tip) loadTip.textContent=tip; };

// ==============================================================
// Procedural textures — 16x16 MC-style
// ==============================================================
function makeTex(drawFn, opts={}){
  const c=document.createElement('canvas');
  c.width=16;c.height=16;
  const ctx=c.getContext('2d');
  ctx.imageSmoothingEnabled=false;
  drawFn(ctx);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=THREE.NearestFilter;
  t.minFilter=THREE.NearestMipmapLinearFilter;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.colorSpace=THREE.SRGBColorSpace;
  t.anisotropy=1;
  return t;
}
function fillBase(ctx,c){ ctx.fillStyle=c; ctx.fillRect(0,0,16,16); }
function speckle(ctx,c,n){
  ctx.fillStyle=c;
  for(let i=0;i<n;i++) ctx.fillRect((Math.random()*16)|0,(Math.random()*16)|0,1,1);
}

const T={};
T.grassTop = makeTex(ctx=>{
  fillBase(ctx,'#5eb04a');
  speckle(ctx,'#4a9a3a',26);
  speckle(ctx,'#78c465',20);
  speckle(ctx,'#3d8730',10);
  speckle(ctx,'#82d06a',8);
});
T.dirt = makeTex(ctx=>{
  fillBase(ctx,'#8b5a2b');
  speckle(ctx,'#6d4620',30);
  speckle(ctx,'#a06e3d',20);
  speckle(ctx,'#5a3a1a',12);
});
T.grassSide = makeTex(ctx=>{
  fillBase(ctx,'#8b5a2b');
  speckle(ctx,'#6d4620',22);
  speckle(ctx,'#a06e3d',15);
  speckle(ctx,'#5a3a1a',8);
  ctx.fillStyle='#5eb04a';
  for(let x=0;x<16;x++){
    const h=3+((Math.random()*3)|0);
    ctx.fillRect(x,0,1,h);
  }
  ctx.fillStyle='#4a9a3a';
  for(let x=0;x<16;x++){
    if(Math.random()<0.45) ctx.fillRect(x,(Math.random()*4)|0,1,1);
  }
  ctx.fillStyle='#78c465';
  for(let x=0;x<16;x++){
    if(Math.random()<0.3) ctx.fillRect(x,(Math.random()*3)|0,1,1);
  }
});
T.stone = makeTex(ctx=>{
  fillBase(ctx,'#7f7f7f');
  speckle(ctx,'#6a6a6a',36);
  speckle(ctx,'#909090',24);
  speckle(ctx,'#555',8);
  speckle(ctx,'#a5a5a5',10);
});
T.cobble = makeTex(ctx=>{
  fillBase(ctx,'#5a5a5a');
  const chunks=[[0,0,7,6],[8,0,7,5],[0,7,4,5],[5,7,6,4],[12,6,4,6],[0,13,7,3],[8,12,8,4]];
  chunks.forEach(([x,y,w,h])=>{
    ctx.fillStyle='#8a8a8a';ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#a0a0a0';ctx.fillRect(x,y,w,1);ctx.fillRect(x,y,1,h);
    ctx.fillStyle='#555';ctx.fillRect(x+w-1,y,1,h);ctx.fillRect(x,y+h-1,w,1);
    ctx.fillStyle='#6a6a6a';
    for(let i=0;i<3;i++) ctx.fillRect(x+1+((Math.random()*(w-2))|0),y+1+((Math.random()*(h-2))|0),1,1);
  });
});
T.logSide = makeTex(ctx=>{
  fillBase(ctx,'#6b4a2a');
  for(let x=0;x<16;x++){
    ctx.fillStyle=Math.random()<0.4?'#553a20':(Math.random()<0.5?'#7a5a35':'#6b4a2a');
    ctx.fillRect(x,0,1,16);
  }
  speckle(ctx,'#3a2812',18);
  speckle(ctx,'#8a6a40',10);
  // couple of knots
  for(let i=0;i<2;i++){
    const x=2+((Math.random()*12)|0), y=2+((Math.random()*12)|0);
    ctx.fillStyle='#3a2812';ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#553a20';ctx.fillRect(x,y,1,1);
  }
});
T.logTop = makeTex(ctx=>{
  fillBase(ctx,'#b48a58');
  ctx.strokeStyle='#8a6035';ctx.lineWidth=1;
  for(let r=1.5;r<8;r+=1.8){
    ctx.beginPath();ctx.arc(8,8,r,0,Math.PI*2);ctx.stroke();
  }
  speckle(ctx,'#8a6035',12);
  speckle(ctx,'#c9a070',8);
  ctx.fillStyle='#5a3818';ctx.fillRect(7,7,2,2);
});
T.leaves = makeTex(ctx=>{
  fillBase(ctx,'#2a5a1c');
  speckle(ctx,'#1c3d14',40);
  speckle(ctx,'#3a7a2a',35);
  speckle(ctx,'#4d9a35',22);
  speckle(ctx,'#5cb040',10);
  // scattered dark holes
  for(let i=0;i<8;i++){
    ctx.fillStyle='#132a0d';
    ctx.fillRect((Math.random()*16)|0,(Math.random()*16)|0,1,1);
  }
});
T.planks = makeTex(ctx=>{
  const rows=[0,4,8,12];
  rows.forEach((y,i)=>{
    ctx.fillStyle=(i%2)? '#a07040':'#8f5f30';
    ctx.fillRect(0,y,16,4);
    ctx.fillStyle='#5a3818';ctx.fillRect(0,y+3,16,1);
    for(let x=0;x<16;x++){
      if(Math.random()<0.25){
        ctx.fillStyle=Math.random()<0.5?'#7a5028':'#b58048';
        ctx.fillRect(x,y+((Math.random()*3)|0),1,1);
      }
    }
    const seam=(i*5+3)%16;
    ctx.fillStyle='#5a3818';ctx.fillRect(seam,y,1,4);
    ctx.fillStyle='#c89060';ctx.fillRect(0,y,16,1);
  });
});
T.glass = makeTex(ctx=>{
  ctx.clearRect(0,0,16,16);
  ctx.fillStyle='rgba(180,220,240,0.15)';ctx.fillRect(0,0,16,16);
  ctx.strokeStyle='#cfe6f2';ctx.lineWidth=1;
  ctx.strokeRect(0.5,0.5,15,15);
  ctx.strokeRect(2.5,2.5,11,11);
  ctx.fillStyle='#e0f0f8';
  ctx.fillRect(0,0,16,1);ctx.fillRect(0,0,1,16);
  // small shine
  ctx.fillStyle='rgba(255,255,255,0.4)';
  ctx.fillRect(3,3,3,1);ctx.fillRect(3,3,1,3);
});
function oreTex(oreColor,oreLight){
  return makeTex(ctx=>{
    fillBase(ctx,'#7f7f7f');
    speckle(ctx,'#6a6a6a',30);
    speckle(ctx,'#909090',18);
    speckle(ctx,'#555',6);
    // 3 clusters
    const centers=[[4,4],[11,5],[7,12]];
    centers.forEach(([cx,cy])=>{
      const shape=[[0,0],[1,0],[0,1],[1,1],[2,1],[1,2],[-1,0],[0,-1],[2,0],[-1,1]];
      shape.forEach(([dx,dy])=>{
        if(Math.random()<0.7){
          ctx.fillStyle=oreColor;
          ctx.fillRect(cx+dx,cy+dy,1,1);
        }
      });
      shape.forEach(([dx,dy])=>{
        if(Math.random()<0.35){
          ctx.fillStyle=oreLight;
          ctx.fillRect(cx+dx,cy+dy,1,1);
        }
      });
    });
  });
}
T.diamond_ore = oreTex('#5cd8e0','#a8f3f7');
T.iron_ore    = oreTex('#c8a080','#e4c8a8');
T.coal_ore    = oreTex('#2a2a2a','#4a4a4a');
T.gold_ore    = oreTex('#e8c060','#ffe090');
T.sand = makeTex(ctx=>{
  fillBase(ctx,'#e0cf88');
  speckle(ctx,'#c8b070',28);
  speckle(ctx,'#f0e0a0',22);
  speckle(ctx,'#b09858',8);
});
T.bedrock = makeTex(ctx=>{
  fillBase(ctx,'#3a3a3a');
  for(let i=0;i<14;i++){
    ctx.fillStyle=['#252525','#4a4a4a','#5a5a5a','#2f2f2f','#3f3f3f'][(Math.random()*5)|0];
    const x=(Math.random()*13)|0,y=(Math.random()*13)|0;
    ctx.fillRect(x,y,2+((Math.random()*3)|0),2+((Math.random()*3)|0));
  }
  speckle(ctx,'#1a1a1a',10);
});

setLoad(0.15,'贴图已生成...');

// ==============================================================
// Materials — BoxGeometry material order: [+x,-x,+y,-y,+z,-z]
// ==============================================================
function mat(map, opts={}){
  return new THREE.MeshLambertMaterial(Object.assign({map},opts));
}
const M={};
M.grass = [mat(T.grassSide),mat(T.grassSide),mat(T.grassTop),mat(T.dirt),mat(T.grassSide),mat(T.grassSide)];
M.dirt  = mat(T.dirt);
M.stone = mat(T.stone);
M.cobble= mat(T.cobble);
M.log   = [mat(T.logSide),mat(T.logSide),mat(T.logTop),mat(T.logTop),mat(T.logSide),mat(T.logSide)];
M.leaves= mat(T.leaves);
M.planks= mat(T.planks);
M.glass = mat(T.glass,{transparent:true,opacity:0.55,depthWrite:false});
M.diamond_ore = mat(T.diamond_ore);
M.iron_ore    = mat(T.iron_ore);

// bumps / small hills
function hill(cx,cz,r){
  for(let x=cx-r-1;x<=cx+r+1;x++)for(let z=cz-r-1;z<=cz+r+1;z++){
    const d=Math.hypot(x-cx,z-cz);
    if(x<-R||x>R||z<-R||z>R) continue;
    if(d<r){ setB(x,0,z,'grass'); setB(x,-1,z,'dirt'); }
    if(d<r-1.2){ setB(x,1,z,'grass'); setB(x,0,z,'dirt'); }
    if(d<r-2.4){ setB(x,2,z,'grass'); setB(x,1,z,'dirt'); }
  }
}

// trees
function tree(x,z){
  // find ground top
  let by=0; while(getB(x,by,z)) by++;
  const bottom=by, top=bottom+4;
  for(let i=0;i<4;i++) setB(x,bottom+i,z,'log');
  for(let dx=-2;dx<=2;dx++) for(let dz=-2;dz<=2;dz++){
    if(dx===0&&dz===0) continue;
    if(Math.abs(dx)===2&&Math.abs(dz)===2 && Math.random()<0.6) continue;
    if(!getB(x+dx,top-1,z+dz)) setB(x+dx,top-1,z+dz,'leaves');
    if(!getB(x+dx,top,z+dz))   setB(x+dx,top,z+dz,'leaves');
  }
  for(let dx=-1;dx<=1;dx++) for(let dz=-1;dz<=1;dz++){
    if(!getB(x+dx,top+1,z+dz)) setB(x+dx,top+1,z+dz,'leaves');
  }
  if(!getB(x,top+2,z)) setB(x,top+2,z,'leaves');
  setB(x,top,z,'log');
  setB(x,top+1,z,'log');
}

// house
function house(x0,z0){
  const w=7,d=6,h=4;
  for(let x=x0;x<x0+w;x++) for(let z=z0;z<z0+d;z++) setB(x,0,z,'planks');
  for(let y=1;y<=h;y++){
    for(let x=x0;x<x0+w;x++){ setB(x,y,z0,'planks'); setB(x,y,z0+d-1,'planks'); }
    for(let z=z0;z<z0+d;z++){ setB(x0,y,z,'planks'); setB(x0+w-1,y,z,'planks'); }
  }
  // corner logs
  for(let y=1;y<=h;y++){
    setB(x0,y,z0,'log'); setB(x0+w-1,y,z0,'log');
    setB(x0,y,z0+d-1,'log'); setB(x0+w-1,y,z0+d-1,'log');
  }
  // roof — stepped planks
  for(let x=x0-1;x<=x0+w;x++) for(let z=z0-1;z<=z0+d;z++) setB(x,h+1,z,'planks');
  for(let x=x0;x<x0+w;x++) for(let z=z0;z<z0+d;z++) if(Math.random()<0.9) setB(x,h+2,z,'planks');
  // door opening (front, along z0 side)
  delB(x0+3,1,z0); delB(x0+3,2,z0);
  // windows
  setB(x0+1,2,z0,'glass'); setB(x0+5,2,z0,'glass');
  setB(x0,2,z0+2,'glass'); setB(x0+w-1,2,z0+3,'glass');
  setB(x0+2,2,z0+d-1,'glass'); setB(x0+4,2,z0+d-1,'glass');
  // cobble path
  for(let i=1;i<=4;i++) setB(x0+3,-1,z0-i,'cobble');
  // chimney
  for(let y=1;y<=h+3;y++) setB(x0+w-2,y,z0+d-2,'cobble');
}

  cells.forEach(([dx,dz])=>{
    if(Math.random()<0.8) setB(cx+dx,0,cz+dz,Math.random()<0.55?ore:'stone');

  });
  setB(cx,0,cz,ore); setB(cx,1,cz,ore);
}

// Player + collision
// ==============================================================
const player = {
  pos: new THREE.Vector3(0, 0, 14),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: 0,
  onGround: false,
  r: 0.3, h: 1.75, eye: 1.6,
};

function isSolidBlock(x,y,z){
  const b = world.get(key(x,y,z));
  if(!b) return false;
  if(b==='leaves') return false;
  return true;
}

const WORLD_MIN = -R + 0.5, WORLD_MAX = R + 0.5;

function moveAndCollide(dx,dy,dz){
  const r=player.r, h=player.h;
  // X
  if(dx!==0){
    player.pos.x += dx;
    const y0=Math.floor(player.pos.y+0.01), y1=Math.floor(player.pos.y+h-0.01);
    const z0=Math.floor(player.pos.z-r), z1=Math.floor(player.pos.z+r);
    for(let y=y0;y<=y1;y++)for(let z=z0;z<=z1;z++){
      if(dx>0){
        const bx=Math.floor(player.pos.x+r);
        if(isSolidBlock(bx,y,z)){ player.pos.x = bx - r - 1e-3; break; }
      } else {
        const bx=Math.floor(player.pos.x-r);
        if(isSolidBlock(bx,y,z)){ player.pos.x = bx + 1 + r + 1e-3; break; }
      }
    }
  }
  // Z
  if(dz!==0){
    player.pos.z += dz;
    const y0=Math.floor(player.pos.y+0.01), y1=Math.floor(player.pos.y+h-0.01);
    const x0=Math.floor(player.pos.x-r), x1=Math.floor(player.pos.x+r);
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
      if(dz>0){
        const bz=Math.floor(player.pos.z+r);
        if(isSolidBlock(x,y,bz)){ player.pos.z = bz - r - 1e-3; break; }
      } else {
        const bz=Math.floor(player.pos.z-r);
        if(isSolidBlock(x,y,bz)){ player.pos.z = bz + 1 + r + 1e-3; break; }
      }
    }
  }
  // Y
  player.pos.y += dy;
  {
    const x0=Math.floor(player.pos.x-r), x1=Math.floor(player.pos.x+r);
    const z0=Math.floor(player.pos.z-r), z1=Math.floor(player.pos.z+r);
    if(dy<=0){
      const by=Math.floor(player.pos.y);
      let landed=false;
      for(let x=x0;x<=x1;x++)for(let z=z0;z<=z1;z++){
        if(isSolidBlock(x,by,z)){ player.pos.y = by+1; player.vel.y=0; player.onGround=true; landed=true; break; }
      }
      if(!landed) player.onGround=false;
    } else {
      const by=Math.floor(player.pos.y+h);
      for(let x=x0;x<=x1;x++)for(let z=z0;z<=z1;z++){
        if(isSolidBlock(x,by,z)){ player.pos.y = by - h - 1e-3; player.vel.y=0; break; }
      }
    }
  }
  // Boundary clamp
  if(player.pos.x<WORLD_MIN) player.pos.x=WORLD_MIN;
  if(player.pos.x>WORLD_MAX) player.pos.x=WORLD_MAX;
  if(player.pos.z<WORLD_MIN) player.pos.z=WORLD_MIN;
  if(player.pos.z>WORLD_MAX) player.pos.z=WORLD_MAX;
  if(player.pos.y<-8){ player.pos.set(0,2,0); player.vel.set(0,0,0); }
}

const input = { joyX:0, joyY:0, wantJump:false };

const JOY = { id:null, cx:0, cy:0, r:52 };
const LOOK = { id:null, lastX:0, lastY:0 };
const AI_DRAG = {
  id:null, startX:0, startY:0, startT:0,
  curX:0, curY:0, moved:0, active:false, willTap:true,
};

function joyStart(t, rect){
  JOY.id = t.identifier;
  JOY.cx = rect.left + rect.width/2;
  JOY.cy = rect.top + rect.height/2;
  updateJoy(t.clientX, t.clientY);
}
function updateJoy(x,y){
  let dx = x - JOY.cx, dy = y - JOY.cy;
  const d = Math.hypot(dx,dy);
  const R = JOY.r;
  if(d>R){ dx = dx/d*R; dy = dy/d*R; }
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  input.joyX = dx/R;
  input.joyY = dy/R;
}
function joyEnd(){
  JOY.id=null;
  input.joyX=0; input.joyY=0;
  joyKnob.style.transform = 'translate(-50%, -50%)';
}

function lookStart(t){
  LOOK.id = t.identifier;
  LOOK.lastX = t.clientX; LOOK.lastY = t.clientY;
}
function lookMove(t){
  const dx = t.clientX - LOOK.lastX;
  const dy = t.clientY - LOOK.lastY;
  LOOK.lastX = t.clientX; LOOK.lastY = t.clientY;
  const S = 0.0055;
  player.yaw   -= dx * S;
  player.pitch -= dy * S;
  const L = Math.PI/2 - 0.02;
  if(player.pitch>L) player.pitch=L;
  if(player.pitch<-L) player.pitch=-L;
}
function lookEnd(){ LOOK.id=null; }

// AI ball drag
function aiStart(t){
  AI_DRAG.id = t.identifier;
  AI_DRAG.startX = t.clientX; AI_DRAG.startY = t.clientY;
  AI_DRAG.curX = t.clientX; AI_DRAG.curY = t.clientY;
  AI_DRAG.moved = 0;
  AI_DRAG.startT = performance.now();
  AI_DRAG.active = true;
  AI_DRAG.willTap = true;
  // visual: enter drag state immediately
  aiBall.classList.remove('output','thinking');
  aiBall.classList.add('dragging');
  // hide any output panel
  hideOutput();
  // ball at finger (but center on finger, so offset it a bit)
  moveAIBallTo(t.clientX, t.clientY);
  // crosshair above finger
  dragCross.style.display='block';
  moveCrossTo(t.clientX, t.clientY);
  // voice bubble + start voice
  voiceBubble.style.display='block';
  voiceTxt.textContent = '正在聆听...';
  AI_STATE.voiceText = '';
  startVoice();
}
function aiMove(t){
  const dx = t.clientX - AI_DRAG.startX;
  const dy = t.clientY - AI_DRAG.startY;
  const d = Math.hypot(dx,dy);
  if(d > AI_DRAG.moved) AI_DRAG.moved = d;
  if(AI_DRAG.moved > 8) AI_DRAG.willTap = false;
  AI_DRAG.curX = t.clientX; AI_DRAG.curY = t.clientY;
  moveAIBallTo(t.clientX, t.clientY);
  moveCrossTo(t.clientX, t.clientY);
}
function aiEnd(){
  const dt = performance.now() - AI_DRAG.startT;
  const wasTap = AI_DRAG.willTap && dt < 260;
  AI_DRAG.active = false; AI_DRAG.id = null;
  aiBall.classList.remove('dragging');
  dragCross.style.display='none';
  voiceBubble.style.display='none';
  blockLabel.style.display='none';
  highlightOutline.visible=false;
  highlightFill.visible=false;
  stopVoice();
  resetAIBallHome();
  if(wasTap){
    // tap → open history if any
    if(AI_STATE.history.length>0) toggleHistory();
    return;
  }
  // drag → thinking → output
  const selType = AI_STATE.selectedType;
  const selPos  = AI_STATE.selectedPos;
  const voice   = AI_STATE.voiceText;
  aiBall.classList.add('thinking');
  setTimeout(()=>{
    aiBall.classList.remove('thinking');
    aiBall.classList.add('output');
    showOutput(selType, selPos, voice);
    AI_STATE.state = 'output';
    // reset shake histories
    shakeYaw.length=0; shakePitch.length=0;
  }, 1200 + Math.random()*300);
}
function moveAIBallTo(x,y){
  const s = 64;
  aiBall.style.left = (x - s/2) + 'px';
  aiBall.style.top  = (y - s/2) + 'px';
  aiBall.style.right = 'auto';
}
function resetAIBallHome(){
  aiBall.style.transition = 'left .35s cubic-bezier(.2,.9,.2,1.1), top .35s cubic-bezier(.2,.9,.2,1.1)';
  aiBall.style.left = (window.innerWidth - 64 - 16) + 'px';
  aiBall.style.top  = '16px';
  aiBall.style.right = 'auto';
  setTimeout(()=>{ aiBall.style.transition=''; }, 400);
}
function moveCrossTo(x,y){
  // offset upward ~ 30mm ~ 100..120 css px
  const off = Math.min(140, Math.max(80, window.innerHeight*0.18));
  dragCross.style.left = x + 'px';
  dragCross.style.top  = (y - off) + 'px';
}

// ==============================================================
// AI state
// ==============================================================
const AI_STATE = {
  state:'idle', // idle | dragging | thinking | output | history
  voiceText:'',
  selectedType:null,
  selectedPos:null,
  history:[],
};

function showOutput(type, pos, voice){
  const info = type ? BLOCK_INFO[type] : null;
  if(!type || !info){
    outName.textContent = '未选中方块';
    outDesc.textContent = '拖动准心对准方块可以询问它的信息。';
    outMeta.innerHTML = `<b>你说的:</b> ${escapeHtml(voice)||'（未识别到语音）'}`;
  } else {
    outName.textContent = info.name;
    outDesc.textContent = RESPONSES[type] || info.desc;
    const q = voice ? escapeHtml(voice) : '（未识别到语音，使用默认询问）';
    outMeta.innerHTML =
      `<b>选中方块:</b> ${info.name} @ (${pos[0]}, ${pos[1]}, ${pos[2]})<br>` +
      `<b>你说的:</b> ${q}<br>` +
      `<b>识别依据:</b> 视线射线 + 语音输入`;
    // push history
    AI_STATE.history.unshift({
      type, name: info.name, voice: voice || '（默认询问）',
      desc: RESPONSES[type] || info.desc,
    });
    if(AI_STATE.history.length>20) AI_STATE.history.pop();
  }
  outputPanel.style.display='block';
}
function hideOutput(){
  outputPanel.style.display='none';
  aiBall.classList.remove('output','thinking');
  if(AI_STATE.history.length>0) aiBall.classList.add('has-history');
  AI_STATE.state = AI_STATE.history.length>0 ? 'idle' : 'idle';
}
function toggleHistory(){
  if(historyPanel.style.display==='block'){
    historyPanel.style.display='none';
    return;
  }
  renderHistory();
  hideOutput();
  historyPanel.style.display='block';
}
function renderHistory(){
  if(AI_STATE.history.length===0){
    histList.innerHTML = '<div class="empty">暂无历史对话</div>';
    return;
  }
  histList.innerHTML = AI_STATE.history.map(h=>`
    <div class="item">
      <div class="name">${escapeHtml(h.name)}</div>
      <div class="q">Q: ${escapeHtml(h.voice)}</div>
      <div class="d">${escapeHtml(h.desc)}</div>
    </div>
  `).join('');
}
function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

histClose.addEventListener('click', e=>{
  e.stopPropagation();
  historyPanel.style.display='none';
});

// ==============================================================
// Voice recognition
// ==============================================================
let rec = null;
let recActive = false;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  try{
    rec = new SR();
    rec.lang = 'zh-CN';
    rec.continuous = true;
    rec.interimResults = true;
    rec.onresult = e=>{
      let t='';
      for(let i=0;i<e.results.length;i++) t += e.results[i][0].transcript;
      AI_STATE.voiceText = t.trim();
      voiceTxt.textContent = AI_STATE.voiceText || '正在聆听...';
    };
    rec.onerror = ()=>{};
    rec.onend = ()=>{ recActive=false; };
  }catch(e){ rec=null; }
}
function startVoice(){
  if(!rec) return;
  if(recActive) return;
  AI_STATE.voiceText='';
  try{ rec.start(); recActive=true; }catch(e){}
}
function stopVoice(){
  if(!rec || !recActive) return;
  try{ rec.stop(); }catch(e){}
  recActive=false;
}

// ==============================================================
// Touch routing
// ==============================================================
function isUIEl(el){
  return el===joystick || joystick.contains(el)
      || el===aiBall  || aiBall.contains(el)
      || el===jumpBtn
      || el===historyPanel || historyPanel.contains(el)
      || el===outputPanel  || outputPanel.contains(el);
}

document.addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    const target = t.target;
    if(target===joystick || joystick.contains(target)){
      if(JOY.id===null) joyStart(t, joystick.getBoundingClientRect());
    } else if(target===aiBall || aiBall.contains(target)){
      if(AI_DRAG.id===null && AI_STATE.state!=='thinking') aiStart(t);
    } else if(target===jumpBtn){
      if(player.onGround){ player.vel.y = 8.4; player.onGround=false; }
    } else if(historyPanel.contains(target) || outputPanel.contains(target)){
      // ignore — let clicks pass
    } else {
      if(LOOK.id===null) lookStart(t);
    }
  }
  if(!(historyPanel.contains(e.target)||outputPanel.contains(e.target))) e.preventDefault();
},{passive:false});

document.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches){
    if(t.identifier===JOY.id) updateJoy(t.clientX,t.clientY);
    else if(t.identifier===AI_DRAG.id) aiMove(t);
    else if(t.identifier===LOOK.id) lookMove(t);
  }
  if(!(historyPanel.contains(e.target)||outputPanel.contains(e.target))) e.preventDefault();
},{passive:false});

function endTouch(t){
  if(t.identifier===JOY.id) joyEnd();
  else if(t.identifier===AI_DRAG.id) aiEnd();
  else if(t.identifier===LOOK.id) lookEnd();
}
document.addEventListener('touchend', e=>{
  for(const t of e.changedTouches) endTouch(t);
},{passive:false});
document.addEventListener('touchcancel', e=>{
  for(const t of e.changedTouches) endTouch(t);
},{passive:false});

document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('contextmenu', e=>e.preventDefault());

// Also allow desktop mouse for testing (optional)
let mouseLook=false, mouseLX=0, mouseLY=0;
renderer.domElement.addEventListener('mousedown', e=>{
  if(e.button===0){ mouseLook=true; mouseLX=e.clientX; mouseLY=e.clientY; }
});
window.addEventListener('mouseup', ()=>{ mouseLook=false; });
window.addEventListener('mousemove', e=>{
  if(!mouseLook) return;
  const dx=e.clientX-mouseLX, dy=e.clientY-mouseLY;
  mouseLX=e.clientX; mouseLY=e.clientY;
  const S=0.0035;
  player.yaw-=dx*S; player.pitch-=dy*S;
  const L=Math.PI/2-0.02;
  player.pitch=Math.max(-L,Math.min(L,player.pitch));
});
window.addEventListener('keydown', e=>{
  if(e.code==='Space' && player.onGround){ player.vel.y=8.4; player.onGround=false; }
  const s = e.code==='KeyW'?[0,-1]:e.code==='KeyS'?[0,1]:e.code==='KeyA'?[-1,0]:e.code==='KeyD'?[1,0]:null;
  if(s){ input.joyX=s[0]; input.joyY=s[1]; }
});
window.addEventListener('keyup', e=>{
  if(['KeyW','KeyS','KeyA','KeyD'].includes(e.code)){ input.joyX=0; input.joyY=0; }
});

// ==============================================================
// Raycast during drag
// ==============================================================
const raycaster = new THREE.Raycaster();
raycaster.far = 14;
const ndc = new THREE.Vector2();

function raycastCrosshair(){
  // use dragCross screen position
  const cx = parseFloat(dragCross.style.left);
  const cy = parseFloat(dragCross.style.top);
  ndc.x = (cx / window.innerWidth) * 2 - 1;
  ndc.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(blockMeshes, false);
  if(hits.length===0){
    AI_STATE.selectedType=null;
    AI_STATE.selectedPos=null;
    highlightOutline.visible=false;
    highlightFill.visible=false;
    blockLabel.style.display='none';
    return;
  }
  const h = hits[0];
  const type = h.object.userData.type;
  const positions = h.object.userData.positions;
  const idx = h.instanceId;
  if(idx==null || !positions[idx]){ return; }
  const [x,y,z] = positions[idx];
  AI_STATE.selectedType = type;
  AI_STATE.selectedPos  = [x,y,z];
  highlightOutline.position.set(x+0.5, y+0.5, z+0.5);
  highlightFill.position.set(x+0.5, y+0.5, z+0.5);
  highlightOutline.visible=true;
  highlightFill.visible=true;
  const info = BLOCK_INFO[type];
  if(info){
    blockLabel.textContent = info.name;
    blockLabel.style.display='block';
  }
}

// ==============================================================
// Shake detection (close output)
// ==============================================================
const shakeYaw = [];   // {t, y}
const shakePitch = []; // {t, p}
function pushShake(){
  const now = performance.now();
  shakeYaw.push({t:now, v:player.yaw});
  shakePitch.push({t:now, v:player.pitch});
  const cutoff = now - 900;
  while(shakeYaw.length && shakeYaw[0].t<cutoff) shakeYaw.shift();
  while(shakePitch.length && shakePitch[0].t<cutoff) shakePitch.shift();
}
function detectShake(arr){
  if(arr.length<6) return false;
  let crossings=0, totalDelta=0;
  for(let i=1;i<arr.length-1;i++){
    const d1 = arr[i].v - arr[i-1].v;
    const d2 = arr[i+1].v - arr[i].v;
    if(d1*d2 < 0 && Math.abs(d1) > 0.04) crossings++;
    totalDelta += Math.abs(d1);
  }
  return crossings>=3 && totalDelta>0.9;
}

// ==============================================================
// Resize
// ==============================================================
function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  // reset ai ball home if idle
  if(!AI_DRAG.active) resetAIBallHome();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', ()=> setTimeout(onResize, 200));

// ==============================================================
// Loop
// ==============================================================
const clock = new THREE.Clock();
let last = performance.now();
let frames=0, fpsAcc=0;

function loop(){
  const dt = Math.min(0.05, clock.getDelta());
  // apply input to velocity
  const speed = 4.6;
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right   = new THREE.Vector3(Math.cos(player.yaw),  0, -Math.sin(player.yaw));
  const wish = new THREE.Vector3();
  wish.addScaledVector(forward, -input.joyY);
  wish.addScaledVector(right,    input.joyX);
  if(wish.lengthSq()>1) wish.normalize();
  const vx = wish.x * speed;
  const vz = wish.z * speed;
  // gravity
  player.vel.y -= 22 * dt;
  if(player.vel.y < -30) player.vel.y=-30;
  moveAndCollide(vx*dt, player.vel.y*dt, vz*dt);
  // camera
  camera.position.set(player.pos.x, player.pos.y + player.eye, player.pos.z);
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
  // sky follows
  sky.position.copy(camera.position);
  // sun follows camera so distance feels infinite
  const sunDir = sun.position.clone().normalize();
  sunDisc.position.copy(camera.position).addScaledVector(sunDir, 140);
  sunGlow.position.copy(sunDisc.position);
  cloudGroup.position.x += dt * 0.6;
  if(cloudGroup.position.x > 60) cloudGroup.position.x -= 120;

  // AI drag raycast
  if(AI_DRAG.active){
    raycastCrosshair();
  }

  // Shake detect for closing output
  pushShake();
  if(AI_STATE.state==='output'){
    if(detectShake(shakeYaw) || detectShake(shakePitch)){
      hideOutput();
      AI_STATE.state = 'idle';
      shakeYaw.length=0; shakePitch.length=0;
    }
  }

  renderer.render(scene, camera);

  // fps (hidden by default)
  frames++;
  fpsAcc += dt;
  if(fpsAcc>0.5){
    fpsEl.textContent = Math.round(frames/fpsAcc)+' fps';
    frames=0; fpsAcc=0;
  }
  requestAnimationFrame(loop);
}

// ==============================================================
// Init
// ==============================================================
setLoad(1.0,'欢迎来到方块世界');
setTimeout(()=>{
  loadingEl.style.opacity='0';
  setTimeout(()=>loadingEl.style.display='none', 500);
  onResize();
  resetAIBallHome();
  requestAnimationFrame(loop);
}, 300);

</script>
