<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>MC AI Demo</title>
<style>
:root{
  --accent:#7ed957;
  --accent-2:#4fc3f7;
  --gold:#ffdc50;
  --panel-bg:rgba(18,22,28,0.94);
  --panel-border:rgba(255,255,255,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:#eee;touch-action:none;overscroll-behavior:none;}
#app{position:fixed;inset:0;overflow:hidden;}
canvas{display:block;width:100%;height:100%;touch-action:none;}

/* Loading */
#loading{position:fixed;inset:0;background:#0a0e14;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:opacity .5s;}
#loading .logo{font-size:22px;font-weight:700;letter-spacing:4px;color:var(--accent);text-shadow:0 0 12px rgba(126,217,87,.5);margin-bottom:18px;}
#loading .bar{width:200px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#loading .bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .3s;border-radius:3px;}
#loading .tip{margin-top:12px;font-size:11px;color:#888;letter-spacing:1px;}

/* Portrait hint */
#rotate-hint{position:fixed;inset:0;background:#0a0e14;z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;color:#ccc;font-size:14px;letter-spacing:1px;}
#rotate-hint .icon{width:60px;height:90px;border:3px solid #7ed957;border-radius:8px;margin-bottom:16px;animation:rot 1.6s infinite ease-in-out;}
@keyframes rot{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media (orientation:portrait){#rotate-hint{display:flex;}}

/* Joystick */
#joystick{position:fixed;left:24px;bottom:24px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.22);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:20;touch-action:none;}
#joystick .knob{position:absolute;left:50%;top:50%;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f5f5f5,#a8a8a8);border:2px solid rgba(0,0,0,.35);transform:translate(-50%,-50%);box-shadow:0 4px 10px rgba(0,0,0,.4);pointer-events:none;}

/* Jump */
#jump-btn{position:fixed;right:24px;bottom:32px;width:88px;height:88px;border-radius:50%;background:rgba(126,217,87,.18);border:2px solid rgba(126,217,87,.55);color:#dfffcc;font-size:14px;font-weight:600;letter-spacing:2px;z-index:20;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);touch-action:none;}
#jump-btn:active{background:rgba(126,217,87,.35);}

/* Center crosshair */
#center-cross{position:fixed;left:50%;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);pointer-events:none;z-index:15;opacity:.6;}
#center-cross::before,#center-cross::after{content:"";position:absolute;background:#fff;box-shadow:0 0 2px rgba(0,0,0,.9);}
#center-cross::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%);}
#center-cross::after{left:0;top:50%;width:100%;height:2px;transform:translateY(-50%);}

/* AI Ball */
#ai-ball{position:fixed;top:14px;right:14px;width:60px;height:60px;border-radius:50%;z-index:60;background:linear-gradient(135deg,#4fc3f7,#1565c0);border:2px solid rgba(255,255,255,.55);box-shadow:0 6px 18px rgba(30,140,220,.5),inset 0 -8px 12px rgba(0,0,0,.15),inset 0 6px 10px rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px;letter-spacing:1px;font-family:"Courier New",monospace;transition:transform .18s,box-shadow .3s,background .3s;touch-action:none;}
#ai-ball .core{position:relative;z-index:2;}
#ai-ball .ring{position:absolute;inset:-5px;border-radius:50%;border:2px solid transparent;pointer-events:none;}
#ai-ball .badge{position:absolute;top:-3px;right:-3px;width:14px;height:14px;border-radius:50%;background:#ef5350;border:2px solid #fff;display:none;box-shadow:0 0 8px rgba(239,83,80,.9);}
#ai-ball.has-history .badge{display:block;animation:bad 1.6s ease-in-out infinite;}
@keyframes bad{0%,100%{transform:scale(1);}50%{transform:scale(1.2);}}
#ai-ball.dragging{background:linear-gradient(135deg,#ffcd60,#e67a00);box-shadow:0 0 26px rgba(255,183,77,.9),inset 0 6px 10px rgba(255,255,255,.3);transform:scale(1.1);}
#ai-ball.thinking{background:linear-gradient(135deg,#ba68c8,#4a148c);}
#ai-ball.thinking .ring{border-top-color:#fff;border-right-color:#fff;animation:spin 0.9s linear infinite;}
#ai-ball.active{background:linear-gradient(135deg,#7ed957,#2e7d32);box-shadow:0 6px 18px rgba(126,217,87,.55),inset 0 6px 10px rgba(255,255,255,.25);}
@keyframes spin{to{transform:rotate(360deg);}}

/* Drag crosshair (above finger) */
#drag-cross{position:fixed;width:60px;height:60px;pointer-events:none;z-index:58;display:none;transform:translate(-50%,-50%);}
#drag-cross svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(255,220,80,1));}

/* Voice bubble */
#voice-bubble{position:fixed;top:12px;left:50%;transform:translateX(-50%);max-width:60%;padding:10px 18px;border-radius:22px;background:rgba(0,0,0,.78);border:1px solid rgba(126,217,87,.55);color:#eaffd6;font-size:14px;line-height:1.4;z-index:65;display:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#voice-bubble .mic{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef5350;margin-right:8px;vertical-align:middle;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.35);}}
#voice-bubble .txt{vertical-align:middle;}

/* Block name label */
#block-label{position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);padding:6px 16px;background:rgba(0,0,0,.82);border:1px solid rgba(255,220,80,.75);color:#fff8d0;border-radius:6px;font-size:15px;font-weight:600;letter-spacing:1px;z-index:57;display:none;pointer-events:none;text-shadow:0 1px 2px #000;}

/* Chat panel — single panel for output + history + input */
#chat-panel{position:fixed;top:82px;right:14px;width:340px;max-width:78vw;height:min(72vh,440px);background:var(--panel-bg);border:1px solid var(--panel-border);border-radius:14px;z-index:55;display:none;flex-direction:column;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 8px 28px rgba(0,0,0,.55);transform-origin:top right;animation:panelIn .22s ease-out;}
#chat-panel.open{display:flex;}
@keyframes panelIn{from{opacity:0;transform:scale(0.85) translateY(-8px);}to{opacity:1;transform:scale(1) translateY(0);}}
#chat-panel::before{content:"";position:absolute;top:-7px;right:23px;width:14px;height:14px;background:var(--panel-bg);border-top:1px solid var(--panel-border);border-left:1px solid var(--panel-border);transform:rotate(45deg);}

#chat-panel .chat-head{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;border-top-left-radius:14px;border-top-right-radius:14px;background:rgba(0,0,0,0.12);}
#chat-panel .chat-head .who{display:flex;align-items:center;gap:8px;}
#chat-panel .chat-head .avt{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4fc3f7,#1565c0);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#fff;font-family:"Courier New",monospace;}
#chat-panel .chat-head .tt{font-size:13px;font-weight:600;color:#eee;line-height:1.2;}
#chat-panel .chat-head .st{font-size:10px;color:#7ed957;margin-top:2px;letter-spacing:.4px;}
#chat-panel .chat-head .cl{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#ccc;font-size:16px;line-height:1;display:flex;align-items:center;justify-content:center;}
#chat-panel .chat-head .cl:active{background:rgba(255,255,255,0.14);}

#chat-panel .chat-body{flex:1;overflow-y:auto;padding:10px 12px;-webkit-overflow-scrolling:touch;}
#chat-panel .chat-body::-webkit-scrollbar{width:4px;}
#chat-panel .chat-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.12);border-radius:2px;}

#chat-panel .empty-state{color:#78909c;text-align:center;padding:24px 12px;font-size:12px;line-height:1.7;}
#chat-panel .empty-state .big{font-size:14px;color:#b0bec5;margin-bottom:8px;font-weight:600;}

#chat-panel .msg{margin:8px 0;display:flex;}
#chat-panel .msg.user{justify-content:flex-end;}
#chat-panel .msg.ai{justify-content:flex-start;}
#chat-panel .msg .bubble{max-width:78%;padding:8px 12px;border-radius:12px;line-height:1.5;font-size:12.5px;word-wrap:break-word;overflow-wrap:break-word;}
#chat-panel .msg.user .bubble{background:linear-gradient(135deg,#2b6cb0,#1e4d7f);color:#f0f8ff;border-bottom-right-radius:4px;}
#chat-panel .msg.ai .bubble{background:rgba(255,255,255,0.06);color:#e8f0f5;border:1px solid rgba(255,255,255,0.08);border-bottom-left-radius:4px;}
#chat-panel .msg.ai .bubble.thinking{color:#b0bec5;font-style:italic;}
#chat-panel .msg.ai .bubble.thinking .dots span{display:inline-block;width:5px;height:5px;background:#7ed957;border-radius:50%;margin:0 1px;animation:thk 1.2s infinite ease-in-out;}
#chat-panel .msg.ai .bubble.thinking .dots span:nth-child(2){animation-delay:0.15s;}
#chat-panel .msg.ai .bubble.thinking .dots span:nth-child(3){animation-delay:0.3s;}
@keyframes thk{0%,80%,100%{opacity:0.25;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}
#chat-panel .block-card{background:rgba(126,217,87,0.10);border-left:2px solid #7ed957;padding:6px 8px;border-radius:6px;margin-bottom:6px;}
#chat-panel .block-card .bt{color:#7ed957;font-weight:700;font-size:12px;margin-bottom:2px;letter-spacing:.5px;display:flex;align-items:center;gap:6px;}
#chat-panel .block-card .bt .icon{width:12px;height:12px;border-radius:2px;background:#7ed957;display:inline-block;}
#chat-panel .block-card .bd{color:#cfd8dc;font-size:11px;line-height:1.5;}
#chat-panel .block-card .pos{color:#78909c;font-size:10px;font-family:monospace;margin-left:auto;}

#chat-panel .chat-foot{padding:8px 10px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:6px;align-items:center;flex-shrink:0;background:rgba(0,0,0,0.15);border-bottom-left-radius:14px;border-bottom-right-radius:14px;}
#chat-panel .chat-foot .mic{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);color:#ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;}
#chat-panel .chat-foot .mic.rec{background:rgba(239,83,80,0.35);border-color:#ef5350;color:#fff;animation:pulse 1s infinite;}
#chat-panel .chat-foot .mic svg{width:16px;height:16px;fill:currentColor;}
#chat-panel .chat-foot input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#eee;padding:8px 12px;border-radius:18px;font-size:12.5px;outline:none;font-family:inherit;user-select:text;-webkit-user-select:text;}
#chat-panel .chat-foot input:focus{border-color:rgba(126,217,87,0.5);}
#chat-panel .chat-foot input::placeholder{color:#78909c;}
#chat-panel .chat-foot .send{width:auto;padding:0 12px;height:34px;border-radius:17px;background:linear-gradient(135deg,#7ed957,#388e3c);border:none;color:#fff;font-size:12px;font-weight:600;flex-shrink:0;}
#chat-panel .chat-foot .send:active{transform:scale(0.94);}
#chat-panel .chat-foot .send:disabled{background:rgba(255,255,255,0.1);color:#666;}

/* Hint */
#hint{position:fixed;left:12px;top:12px;font-size:10px;color:rgba(255,255,255,.55);z-index:10;line-height:1.6;letter-spacing:.5px;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.9);max-width:60%;}
#hint b{color:var(--accent);}
#hint.hidden{opacity:0;transition:opacity .5s;}

/* FPS mini */
#fps{position:fixed;left:12px;bottom:170px;font-size:10px;color:rgba(255,255,255,.35);z-index:5;font-family:monospace;display:none;}
</style>
</head>
<body>
<div id="app">
  <div id="loading">
    <div class="logo">M C · A I</div>
    <div class="bar"><span id="load-bar"></span></div>
    <div class="tip" id="load-tip">正在生成方块世界...</div>
  </div>

  <div id="rotate-hint">
    <div class="icon"></div>
    <div>请横屏使用</div>
  </div>

  <div id="hint">
    左侧摇杆移动 · 右侧滑动看视角 · <b>长按右上 AI 拖到方块</b><br>
    松手后左右晃视角关闭对话 · 点击 AI 打开对话
  </div>

  <div id="center-cross"></div>

  <div id="joystick"><div class="knob" id="joy-knob"></div></div>
  <button id="jump-btn">JUMP</button>

  <div id="ai-ball">
    <div class="ring"></div>
    <div class="core">AI</div>
    <div class="badge"></div>
  </div>

  <div id="drag-cross">
    <svg viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="30" fill="none" stroke="#ffdc50" stroke-width="3"/>
      <circle cx="50" cy="50" r="4" fill="#ffdc50"/>
      <line x1="50" y1="10" x2="50" y2="34" stroke="#ffdc50" stroke-width="3"/>
      <line x1="50" y1="66" x2="50" y2="90" stroke="#ffdc50" stroke-width="3"/>
      <line x1="10" y1="50" x2="34" y2="50" stroke="#ffdc50" stroke-width="3"/>
      <line x1="66" y1="50" x2="90" y2="50" stroke="#ffdc50" stroke-width="3"/>
    </svg>
  </div>

  <div id="voice-bubble"><span class="mic"></span><span class="txt" id="voice-txt">正在聆听...</span></div>

  <div id="block-label"></div>

  <div id="chat-panel">
    <div class="chat-head">
      <div class="who">
        <div class="avt">AI</div>
        <div>
          <div class="tt">MC 助手</div>
          <div class="st">● 在线</div>
        </div>
      </div>
      <button class="cl" id="chat-close">×</button>
    </div>
    <div class="chat-body" id="chat-body">
      <div class="empty-state" id="empty-state">
        <div class="big">你好，我是 MC 助手</div>
        长按我拖到任意方块，松手可识别它<br>
        也可以直接在下方向我提问
      </div>
    </div>
    <div class="chat-foot">
      <button class="mic" id="mic-btn">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.92V21h2v-3.08A7 7 0 0019 11z"/></svg>
      </button>
      <input id="chat-text" type="text" placeholder="问我关于 MC 的问题..." autocomplete="off" autocorrect="off" spellcheck="false" enterkeyhint="send"/>
      <button class="send" id="send-btn">发送</button>
    </div>
  </div>

  <div id="fps">0</div>
</div>

<script type="importmap">

<script type="module" id="main-script">
import * as THREE from 'three';

// ==============================================================
// DOM refs
// ==============================================================
const app        = document.getElementById('app');
const loadingEl  = document.getElementById('loading');
const loadBar    = document.getElementById('load-bar');
const loadTip    = document.getElementById('load-tip');
const joystick   = document.getElementById('joystick');
const joyKnob    = document.getElementById('joy-knob');
const jumpBtn    = document.getElementById('jump-btn');
const aiBall     = document.getElementById('ai-ball');
const dragCross  = document.getElementById('drag-cross');
const voiceBubble= document.getElementById('voice-bubble');
const voiceTxt   = document.getElementById('voice-txt');
const blockLabel = document.getElementById('block-label');
const chatPanel  = document.getElementById('chat-panel');
const chatBody   = document.getElementById('chat-body');
const emptyState = document.getElementById('empty-state');
const chatText   = document.getElementById('chat-text');
const chatClose  = document.getElementById('chat-close');
const sendBtn    = document.getElementById('send-btn');
const micBtn     = document.getElementById('mic-btn');
const hintEl     = document.getElementById('hint');
const fpsEl      = document.getElementById('fps');

const setLoad = (p,tip)=>{ loadBar.style.width=(p*100)+'%'; if(tip) loadTip.textContent=tip; };

// ==============================================================
// Procedural 16x16 textures — MC style
// ==============================================================
function makeTex(drawFn){
  const c=document.createElement('canvas'); c.width=16; c.height=16;
  const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=false;
  drawFn(ctx);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=THREE.NearestFilter;
  t.minFilter=THREE.NearestMipmapLinearFilter;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.colorSpace=THREE.SRGBColorSpace;
  t.generateMipmaps=true;
  return t;
}
function fillBase(ctx,c){ ctx.fillStyle=c; ctx.fillRect(0,0,16,16); }
function speckle(ctx,c,n){ ctx.fillStyle=c; for(let i=0;i<n;i++) ctx.fillRect((Math.random()*16)|0,(Math.random()*16)|0,1,1); }

const T={};
T.grassTop = makeTex(ctx=>{
  fillBase(ctx,'#5eb04a');
  speckle(ctx,'#4a9a3a',28);
  speckle(ctx,'#78c465',22);
  speckle(ctx,'#3d8730',10);
  speckle(ctx,'#82d06a',8);
});
T.dirt = makeTex(ctx=>{
  fillBase(ctx,'#8b5a2b');
  speckle(ctx,'#6d4620',30);
  speckle(ctx,'#a06e3d',22);
  speckle(ctx,'#5a3a1a',12);
});
T.grassSide = makeTex(ctx=>{
  fillBase(ctx,'#8b5a2b');
  speckle(ctx,'#6d4620',22);
  speckle(ctx,'#a06e3d',16);
  speckle(ctx,'#5a3a1a',8);
  ctx.fillStyle='#5eb04a';
  for(let x=0;x<16;x++){ ctx.fillRect(x,0,1,3+((Math.random()*3)|0)); }
  ctx.fillStyle='#4a9a3a';
  for(let x=0;x<16;x++) if(Math.random()<0.45) ctx.fillRect(x,(Math.random()*4)|0,1,1);
  ctx.fillStyle='#78c465';
  for(let x=0;x<16;x++) if(Math.random()<0.28) ctx.fillRect(x,(Math.random()*3)|0,1,1);
});
T.stone = makeTex(ctx=>{
  fillBase(ctx,'#7f7f7f');
  speckle(ctx,'#6a6a6a',38); speckle(ctx,'#909090',24);
  speckle(ctx,'#555',8); speckle(ctx,'#a5a5a5',10);
});
T.cobble = makeTex(ctx=>{
  fillBase(ctx,'#5a5a5a');
  const chunks=[[0,0,7,6],[8,0,7,5],[0,7,4,5],[5,7,6,4],[12,6,4,6],[0,13,7,3],[8,12,8,4]];
  chunks.forEach(([x,y,w,h])=>{
    ctx.fillStyle='#8a8a8a'; ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#a0a0a0'; ctx.fillRect(x,y,w,1); ctx.fillRect(x,y,1,h);
    ctx.fillStyle='#555'; ctx.fillRect(x+w-1,y,1,h); ctx.fillRect(x,y+h-1,w,1);
    ctx.fillStyle='#6a6a6a';
    for(let i=0;i<3;i++) ctx.fillRect(x+1+((Math.random()*(w-2))|0),y+1+((Math.random()*(h-2))|0),1,1);
  });
});
T.logSide = makeTex(ctx=>{
  fillBase(ctx,'#6b4a2a');
  for(let x=0;x<16;x++){
    ctx.fillStyle=Math.random()<0.4?'#553a20':(Math.random()<0.5?'#7a5a35':'#6b4a2a');
    ctx.fillRect(x,0,1,16);
  }
  speckle(ctx,'#3a2812',18); speckle(ctx,'#8a6a40',10);
  for(let i=0;i<2;i++){
    const x=2+((Math.random()*12)|0), y=2+((Math.random()*12)|0);
    ctx.fillStyle='#3a2812'; ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#553a20'; ctx.fillRect(x,y,1,1);
  }
});
T.logTop = makeTex(ctx=>{
  fillBase(ctx,'#b48a58');
  ctx.strokeStyle='#8a6035'; ctx.lineWidth=1;
  for(let r=1.5;r<8;r+=1.8){ ctx.beginPath(); ctx.arc(8,8,r,0,Math.PI*2); ctx.stroke(); }
  speckle(ctx,'#8a6035',12); speckle(ctx,'#c9a070',8);
  ctx.fillStyle='#5a3818'; ctx.fillRect(7,7,2,2);
});
T.leaves = makeTex(ctx=>{
  fillBase(ctx,'#2a5a1c');
  speckle(ctx,'#1c3d14',42); speckle(ctx,'#3a7a2a',36);
  speckle(ctx,'#4d9a35',22); speckle(ctx,'#5cb040',10);
  for(let i=0;i<10;i++){ ctx.fillStyle='#132a0d'; ctx.fillRect((Math.random()*16)|0,(Math.random()*16)|0,1,1); }
});
T.planks = makeTex(ctx=>{
  const rows=[0,4,8,12];
  rows.forEach((y,i)=>{

const world = new Map();

// Base ground

  setB(x,-1,z,'grass');

  setB(x,-4,z,'stone');
  setB(x,-5,z,'bedrock');
}

// Hills
function hill(cx,cz,r){
  for(let x=cx-r-1;x<=cx+r+1;x++)for(let z=cz-r-1;z<=cz+r+1;z++){
    const d=Math.hypot(x-cx,z-cz);
    if(x<-R||x>R||z<-R||z>R) continue;
    if(d<r){ setB(x,0,z,'grass'); setB(x,-1,z,'dirt'); }
    if(d<r-1.2){ setB(x,1,z,'grass'); setB(x,0,z,'dirt'); }
    if(d<r-2.4){ setB(x,2,z,'grass'); setB(x,1,z,'dirt'); }
    if(d<r-3.2){ setB(x,3,z,'grass'); setB(x,2,z,'dirt'); }
  }
}

// Small pond (water)
function pond(cx,cz){
  for(let x=cx-2;x<=cx+2;x++)for(let z=cz-2;z<=cz+2;z++){
    if(Math.hypot(x-cx,z-cz)<2.3){
      delB(x,-1,z);
      setB(x,-1,z,'water');
      setB(x,-2,z,'dirt');
    }
  }
  // sand rim
  for(let x=cx-3;x<=cx+3;x++)for(let z=cz-3;z<=cz+3;z++){
    const d=Math.hypot(x-cx,z-cz);
    if(d>=2.3 && d<3.2 && getB(x,-1,z)==='grass') setB(x,-1,z,'sand');
  }
}

// trees
function tree(x,z){
  let by=0; while(getB(x,by,z)) by++;
  const bottom=by, top=bottom+4;
  for(let i=0;i<4;i++) setB(x,bottom+i,z,'log');
  for(let dx=-2;dx<=2;dx++)for(let dz=-2;dz<=2;dz++){
    if(dx===0&&dz===0) continue;
    if(Math.abs(dx)===2&&Math.abs(dz)===2 && Math.random()<0.6) continue;
    if(!getB(x+dx,top-1,z+dz)) setB(x+dx,top-1,z+dz,'leaves');
    if(!getB(x+dx,top,z+dz))   setB(x+dx,top,z+dz,'leaves');
  }
  for(let dx=-1;dx<=1;dx++)for(let dz=-1;dz<=1;dz++){
    if(!getB(x+dx,top+1,z+dz)) setB(x+dx,top+1,z+dz,'leaves');
  }
  if(!getB(x,top+2,z)) setB(x,top+2,z,'leaves');
  setB(x,top,z,'log');
  setB(x,top+1,z,'log');
}

// House
function house(x0,z0){
  const w=7,d=6,h=4;
  for(let x=x0;x<x0+w;x++)for(let z=z0;z<z0+d;z++) setB(x,0,z,'planks');
  for(let y=1;y<=h;y++){
    for(let x=x0;x<x0+w;x++){ setB(x,y,z0,'planks'); setB(x,y,z0+d-1,'planks'); }
    for(let z=z0;z<z0+d;z++){ setB(x0,y,z,'planks'); setB(x0+w-1,y,z,'planks'); }
  }
  for(let y=1;y<=h;y++){
    setB(x0,y,z0,'log'); setB(x0+w-1,y,z0,'log');
    setB(x0,y,z0+d-1,'log'); setB(x0+w-1,y,z0+d-1,'log');
  }
  // stepped roof
  for(let x=x0-1;x<=x0+w;x++)for(let z=z0-1;z<=z0+d;z++) setB(x,h+1,z,'planks');
  for(let x=x0;x<x0+w;x++)for(let z=z0;z<z0+d;z++) if(Math.random()<0.9) setB(x,h+2,z,'planks');
  // door
  delB(x0+3,1,z0); delB(x0+3,2,z0);
  // windows
  setB(x0+1,2,z0,'glass'); setB(x0+5,2,z0,'glass');
  setB(x0,2,z0+2,'glass'); setB(x0+w-1,2,z0+3,'glass');
  setB(x0+2,2,z0+d-1,'glass'); setB(x0+4,2,z0+d-1,'glass');
  // path
  for(let i=1;i<=5;i++) setB(x0+3,-1,z0-i,'cobble');
  // chimney
  for(let y=1;y<=h+3;y++) setB(x0+w-2,y,z0+d-2,'cobble');
}

// Ore piles
function orePile(cx,cz,ore,size){
  const cells=[];
  for(let dx=-size;dx<=size;dx++)for(let dz=-size;dz<=size;dz++){
    if(Math.hypot(dx,dz)<=size+0.3) cells.push([dx,dz]);
  }
  cells.forEach(([dx,dz])=>{
    if(Math.random()<0.8) setB(cx+dx,0,cz+dz,Math.random()<0.55?ore:'stone');
    if(Math.abs(dx)<=1&&Math.abs(dz)<=1&&Math.random()<0.7) setB(cx+dx,1,cz+dz,Math.random()<0.5?ore:'cobble');
  });
  setB(cx,0,cz,ore); setB(cx,1,cz,ore);
}

{

      dummy.updateMatrix();
      im.setMatrixAt(i, dummy.matrix);
    });
    im.instanceMatrix.needsUpdate=true;
    im.castShadow = (type!=='water' && type!=='glass' && type!=='bedrock');
    im.receiveShadow = true;
    im.frustumCulled = false;
    scene.add(im);
    blockMeshes.push(im);
  }
}

const player = {
  pos: new THREE.Vector3(0, 0, 15),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: -0.15,
  onGround: false,
  r: 0.3, h: 1.75, eye: 1.6,
};

function isSolidBlock(x,y,z){
  const b = world.get(keyOf(x,y,z));
  if(!b) return false;
  if(b==='leaves'||b==='water') return false;
  return true;
}

const WORLD_MIN = -R + 0.5, WORLD_MAX = R + 0.5;

function moveAndCollide(dx,dy,dz){
  const r=player.r, h=player.h;
  if(dx!==0){
    player.pos.x += dx;
    const y0=Math.floor(player.pos.y+0.01), y1=Math.floor(player.pos.y+h-0.01);
    const z0=Math.floor(player.pos.z-r), z1=Math.floor(player.pos.z+r);
    for(let y=y0;y<=y1;y++)for(let z=z0;z<=z1;z++){
      if(dx>0){
        const bx=Math.floor(player.pos.x+r);
        if(isSolidBlock(bx,y,z)){ player.pos.x = bx - r - 1e-3; }
      } else {
        const bx=Math.floor(player.pos.x-r);
        if(isSolidBlock(bx,y,z)){ player.pos.x = bx + 1 + r + 1e-3; }
      }
    }
  }
  if(dz!==0){
    player.pos.z += dz;
    const y0=Math.floor(player.pos.y+0.01), y1=Math.floor(player.pos.y+h-0.01);
    const x0=Math.floor(player.pos.x-r), x1=Math.floor(player.pos.x+r);
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
      if(dz>0){
        const bz=Math.floor(player.pos.z+r);
        if(isSolidBlock(x,y,bz)){ player.pos.z = bz - r - 1e-3; }
      } else {
        const bz=Math.floor(player.pos.z-r);
        if(isSolidBlock(x,y,bz)){ player.pos.z = bz + 1 + r + 1e-3; }
      }
    }
  }
  player.pos.y += dy;
  {
    const x0=Math.floor(player.pos.x-r), x1=Math.floor(player.pos.x+r);
    const z0=Math.floor(player.pos.z-r), z1=Math.floor(player.pos.z+r);
    if(dy<=0){
      const by=Math.floor(player.pos.y);
      let landed=false;
      for(let x=x0;x<=x1;x++)for(let z=z0;z<=z1;z++){
        if(isSolidBlock(x,by,z)){ player.pos.y = by+1; player.vel.y=0; player.onGround=true; landed=true; }
      }
      if(!landed) player.onGround=false;
    } else {
      const by=Math.floor(player.pos.y+h);
      for(let x=x0;x<=x1;x++)for(let z=z0;z<=z1;z++){
        if(isSolidBlock(x,by,z)){ player.pos.y = by - h - 1e-3; player.vel.y=0; }
      }
    }
  }
  if(player.pos.x<WORLD_MIN) player.pos.x=WORLD_MIN;
  if(player.pos.x>WORLD_MAX) player.pos.x=WORLD_MAX;
  if(player.pos.z<WORLD_MIN) player.pos.z=WORLD_MIN;
  if(player.pos.z>WORLD_MAX) player.pos.z=WORLD_MAX;
  if(player.pos.y<-8){ player.pos.set(0,2,0); player.vel.set(0,0,0); }
}

const input = { joyX:0, joyY:0 };
const JOY = { id:null, cx:0, cy:0, r:52 };
const LOOK = { id:null, lastX:0, lastY:0 };
const AI_DRAG = { id:null, startX:0, startY:0, startT:0, curX:0, curY:0, moved:0, active:false, willTap:true };

function joyStart(t, rect){
  JOY.id = t.identifier;
  JOY.cx = rect.left + rect.width/2;
  JOY.cy = rect.top + rect.height/2;
  updateJoy(t.clientX, t.clientY);
}
function updateJoy(x,y){
  let dx = x-JOY.cx, dy = y-JOY.cy;
  const d = Math.hypot(dx,dy); const Rr = JOY.r;
  if(d>Rr){ dx = dx/d*Rr; dy = dy/d*Rr; }
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  input.joyX = dx/Rr; input.joyY = dy/Rr;
}
function joyEnd(){ JOY.id=null; input.joyX=0; input.joyY=0; joyKnob.style.transform='translate(-50%,-50%)'; }

function lookStart(t){ LOOK.id = t.identifier; LOOK.lastX=t.clientX; LOOK.lastY=t.clientY; }
function lookMove(t){
  const dx = t.clientX-LOOK.lastX, dy = t.clientY-LOOK.lastY;
  LOOK.lastX=t.clientX; LOOK.lastY=t.clientY;
  const S=0.0055;
  player.yaw -= dx*S;
  player.pitch -= dy*S;
  const L = Math.PI/2 - 0.02;
  player.pitch = Math.max(-L, Math.min(L, player.pitch));
}
function lookEnd(){ LOOK.id=null; }

const HOME = ()=> ({ x: window.innerWidth - 60 - 14, y: 14 });

function aiStart(t){
  AI_DRAG.id = t.identifier;
  AI_DRAG.startX = t.clientX; AI_DRAG.startY = t.clientY;
  AI_DRAG.curX   = t.clientX; AI_DRAG.curY   = t.clientY;
  AI_DRAG.moved  = 0;
  AI_DRAG.startT = performance.now();
  AI_DRAG.active = true;
  AI_DRAG.willTap= true;
  aiBall.classList.remove('active','thinking');
  aiBall.classList.add('dragging');
  // Collapse chat panel visually (data preserved)
  closeChat();
  aiBall.style.transition='none';
  moveAIBallTo(t.clientX, t.clientY);
  dragCross.style.display='block';
  moveCrossTo(t.clientX, t.clientY);
  voiceBubble.style.display='block';
  voiceTxt.textContent='正在聆听...';
  CHAT.pendingVoice = '';
  startVoice(text=>{ CHAT.pendingVoice = text; voiceTxt.textContent = text || '正在聆听...'; });
  // hide first-time hint
  hintEl.classList.add('hidden');
}
function aiMove(t){
  const dx = t.clientX-AI_DRAG.startX, dy = t.clientY-AI_DRAG.startY;
  const d = Math.hypot(dx,dy);
  if(d > AI_DRAG.moved) AI_DRAG.moved = d;
  if(AI_DRAG.moved > 8) AI_DRAG.willTap = false;
  AI_DRAG.curX = t.clientX; AI_DRAG.curY = t.clientY;
  moveAIBallTo(t.clientX, t.clientY);
  moveCrossTo(t.clientX, t.clientY);
}
function aiEnd(){
  const dt = performance.now() - AI_DRAG.startT;
  const wasTap = AI_DRAG.willTap && dt < 260;
  AI_DRAG.active=false; AI_DRAG.id=null;
  aiBall.classList.remove('dragging');
  dragCross.style.display='none';
  voiceBubble.style.display='none';
  blockLabel.style.display='none';
  highlightOutline.visible=false;
  highlightFill.visible=false;
  stopVoice();
  resetAIBallHome();
  if(wasTap){
    // tap → toggle chat
    toggleChat();
    return;
  }
  // Drag ended → thinking + open chat with new response
  const selType = CHAT.selectedType;
  const selPos  = CHAT.selectedPos;
  const voice   = CHAT.pendingVoice;
  openChat();
  addUserMsg({block:selType, blockPos:selPos, text: voice || '（未识别到语音，请告诉我更多）'});
  aiBall.classList.add('thinking');
  const thinkingId = addThinkingMsg();
  setTimeout(()=>{
    removeMsg(thinkingId);
    aiBall.classList.remove('thinking');
    aiBall.classList.add('active');
    aiBall.classList.add('has-history');
    addAIMsg(buildResponseForBlock(selType, voice), {block:selType, blockPos:selPos});
    CHAT.state = 'output';
    shakeYaw.length=0; shakePitch.length=0;
  }, 900 + Math.random()*300);
}
function moveAIBallTo(x,y){
  const s = 60;
  aiBall.style.left = (x - s/2) + 'px';
  aiBall.style.top  = (y - s/2) + 'px';
  aiBall.style.right='auto';
}
function resetAIBallHome(){
  const h = HOME();
  aiBall.style.transition = 'left .35s cubic-bezier(.2,.9,.2,1.1), top .35s cubic-bezier(.2,.9,.2,1.1)';
  aiBall.style.left = h.x + 'px';
  aiBall.style.top  = h.y + 'px';
  aiBall.style.right='auto';
  setTimeout(()=>{ aiBall.style.transition=''; }, 380);
}
function moveCrossTo(x,y){
  const off = Math.min(140, Math.max(80, window.innerHeight*0.18));
  dragCross.style.left = x + 'px';
  dragCross.style.top  = (y - off) + 'px';
}

const DEFAULT_R = '有意思的问题。我只有一些预设知识，试试问我方块名、工具、生物或"怎么做 XX"。';

function aiRespond(text){
  if(!text) return DEFAULT_R;
  for(const it of INTENTS) if(it.re.test(text)) return it.r;
  return DEFAULT_R;
}

    cobble:'圆石！从石头挖出的产物。用途极广——熔炉、石制工具、活塞、发射器等。',
    log:'橡木原木。1 → 4 木板，2 板 → 4 木棍。原木顶面能看到年轮。',

    planks:'橡木板。合成箱子、工作台、门、船、栅栏。也是熔炉燃料（约 15 秒）。',
    glass:'玻璃！沙子烧制。透明，被打破不会掉落——除非用精准采集。',
    diamond_ore:'钻石矿石！最兴奋的时刻。用铁镐及以上开采。Y=-58 附近最密集。附魔精准采集保留方块。',
    iron_ore:'铁矿石。用石镐及以上，熔炼得到铁锭。装备、水桶、砧板、铁轨全靠它。',
    coal_ore:'煤矿石。木镐可挖，掉落煤炭。熔炉燃料的主力，加木棍合成火把。',
    gold_ore:'金矿石。用铁镐及以上。金装备耐久低但附魔潜力大，也是下界猪灵的最爱。',
    redstone_ore:'红石矿石！铁镐及以上开采，一次掉 4-5 个红石粉。用于制作电路、活塞、机关等自动化。',
    sand:'沙子。受重力影响会自然下落。烧制得到玻璃，与砾石合成砂岩、红砂等。',

function addThinkingMsg(){
  ensureChatHasMessages();

function removeMsg(id){ const e = document.getElementById(id); if(e) e.remove(); }
function scrollChat(){ chatBody.scrollTop = chatBody.scrollHeight; }
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

function openChat(){

  chatPanel.classList.remove('open');
}
function toggleChat(){
  if(chatPanel.classList.contains('open')) closeChat();
  else openChat();
}

chatClose.addEventListener('click', e=>{ e.stopPropagation(); closeChat(); });
sendBtn.addEventListener('click', e=>{ e.stopPropagation(); sendChatText(); });
chatText.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); sendChatText(); }
});
function sendChatText(){
  const txt = chatText.value.trim();
  if(!txt) return;
  chatText.value='';
  addUserMsg({text: txt});
  const tid = addThinkingMsg();
  setTimeout(()=>{
    removeMsg(tid);
    addAIMsg(aiRespond(txt));
  }, 500 + Math.random()*400);
}

// Mic in chat foot
let chatMicActive = false;
micBtn.addEventListener('touchstart', e=>{ e.preventDefault(); e.stopPropagation(); chatMicStart(); }, {passive:false});
micBtn.addEventListener('touchend',   e=>{ e.preventDefault(); e.stopPropagation(); chatMicStop(); }, {passive:false});
micBtn.addEventListener('mousedown',  e=>{ e.preventDefault(); chatMicStart(); });
micBtn.addEventListener('mouseup',    e=>{ e.preventDefault(); chatMicStop(); });
function chatMicStart(){
  if(chatMicActive) return;
  chatMicActive = true;
  micBtn.classList.add('rec');
  chatText.placeholder = '正在聆听...';
  startVoice(text=>{ chatText.value = text; });
}
function chatMicStop(){
  if(!chatMicActive) return;
  chatMicActive = false;
  micBtn.classList.remove('rec');
  chatText.placeholder = '问我关于 MC 的问题...';
  stopVoice();
  setTimeout(()=>{
    if(chatText.value.trim()) sendChatText();
  }, 250);
}

// ==============================================================
// Voice recognition (shared)
// ==============================================================
let rec = null;
let recActive = false;
let recCallback = null;
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(SR){
  try{
    rec = new SR();
    rec.lang = 'zh-CN';
    rec.continuous = true;
    rec.interimResults = true;
    rec.onresult = e=>{
      let t='';
      for(let i=0;i<e.results.length;i++) t += e.results[i][0].transcript;
      if(recCallback) recCallback(t.trim());
    };
    rec.onerror = ()=>{};
    rec.onend = ()=>{ recActive=false; };
  }catch(e){ rec=null; }
}
function startVoice(cb){
  recCallback = cb || null;
  if(!rec){ if(cb) cb(''); return; }
  if(recActive) return;
  try{ rec.start(); recActive=true; }catch(e){}
}
function stopVoice(){
  recCallback = null;
  if(!rec || !recActive) return;
  try{ rec.stop(); }catch(e){}
  recActive=false;
}

// ==============================================================
// Touch routing
// ==============================================================
function pointInside(el, x, y){
  if(!el || el.style.display==='none' && !el.classList.contains('open')) return false;
  const r = el.getBoundingClientRect();
  return x>=r.left && x<=r.right && y>=r.top && y<=r.bottom;
}

document.addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    const target = t.target;
    if(target===joystick || joystick.contains(target)){
      if(JOY.id===null) joyStart(t, joystick.getBoundingClientRect());
    } else if(target===aiBall || aiBall.contains(target)){
      if(AI_DRAG.id===null && !aiBall.classList.contains('thinking')) aiStart(t);
    } else if(target===jumpBtn){
      if(player.onGround){ player.vel.y = 8.4; player.onGround=false; }
    } else if(chatPanel.contains(target)){
      // Panel — let native scroll / input work. Do not preventDefault.
    } else {
      if(LOOK.id===null) lookStart(t);
    }
  }
  if(!chatPanel.contains(e.target)) e.preventDefault();
},{passive:false});

document.addEventListener('touchmove', e=>{
  for(const t of e.changedTouches){
    if(t.identifier===JOY.id) updateJoy(t.clientX,t.clientY);
    else if(t.identifier===AI_DRAG.id) aiMove(t);
    else if(t.identifier===LOOK.id) lookMove(t);
  }
  if(!chatPanel.contains(e.target)) e.preventDefault();
},{passive:false});

function endTouch(t){
  if(t.identifier===JOY.id) joyEnd();
  else if(t.identifier===AI_DRAG.id) aiEnd();
  else if(t.identifier===LOOK.id) lookEnd();
}
document.addEventListener('touchend',    e=>{ for(const t of e.changedTouches) endTouch(t); },{passive:false});
document.addEventListener('touchcancel', e=>{ for(const t of e.changedTouches) endTouch(t); },{passive:false});

document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('contextmenu', e=>e.preventDefault());

// Desktop mouse for testing
let mouseLook=false, mLX=0, mLY=0, mouseTargetIsChat=false;
renderer.domElement.addEventListener('mousedown', e=>{
  if(e.button===0){ mouseLook=true; mLX=e.clientX; mLY=e.clientY; }
});
window.addEventListener('mouseup', ()=>{ mouseLook=false; });
window.addEventListener('mousemove', e=>{
  if(!mouseLook) return;
  const dx=e.clientX-mLX, dy=e.clientY-mLY;
  mLX=e.clientX; mLY=e.clientY;
  const S=0.0035;
  player.yaw-=dx*S; player.pitch-=dy*S;
  const L=Math.PI/2-0.02;
  player.pitch=Math.max(-L,Math.min(L,player.pitch));
});
window.addEventListener('keydown', e=>{
  if(document.activeElement===chatText) return;
  if(e.code==='Space' && player.onGround){ player.vel.y=8.4; player.onGround=false; }
  const s = e.code==='KeyW'?[0,-1]:e.code==='KeyS'?[0,1]:e.code==='KeyA'?[-1,0]:e.code==='KeyD'?[1,0]:null;
  if(s){ input.joyX=s[0]; input.joyY=s[1]; }
});
window.addEventListener('keyup', e=>{
  if(['KeyW','KeyS','KeyA','KeyD'].includes(e.code)){ input.joyX=0; input.joyY=0; }
});

// ==============================================================
// Raycast
// ==============================================================
const raycaster = new THREE.Raycaster();
raycaster.far = 16;
const ndc = new THREE.Vector2();

function raycastCrosshair(){
  const cx = parseFloat(dragCross.style.left);
  const cy = parseFloat(dragCross.style.top);
  ndc.x = (cx / window.innerWidth) * 2 - 1;
  ndc.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(blockMeshes, false);
  if(hits.length===0){
    CHAT.selectedType=null; CHAT.selectedPos=null;
    highlightOutline.visible=false; highlightFill.visible=false;
    blockLabel.style.display='none';
    return;
  }
  const h = hits[0];
  const type = h.object.userData.type;
  if(!type) return;
  const positions = h.object.userData.positions;
  const idx = h.instanceId;
  if(idx==null || !positions[idx]) return;
  const [x,y,z] = positions[idx];
  CHAT.selectedType = type;
  CHAT.selectedPos  = [x,y,z];
  highlightOutline.position.set(x+0.5, y+0.5, z+0.5);
  highlightFill.position.set(x+0.5, y+0.5, z+0.5);
  highlightOutline.visible=true; highlightFill.visible=true;
  const info = BLOCK_INFO[type];
  if(info){ blockLabel.textContent = info.name; blockLabel.style.display='block'; }
}

// ==============================================================
// Shake detection — used to close chat panel
// ==============================================================
const shakeYaw = [];
const shakePitch = [];
function pushShake(){
  const now = performance.now();
  shakeYaw.push({t:now, v:player.yaw});
  shakePitch.push({t:now, v:player.pitch});
  const cutoff = now - 700;
  while(shakeYaw.length   && shakeYaw[0].t   < cutoff) shakeYaw.shift();
  while(shakePitch.length && shakePitch[0].t < cutoff) shakePitch.shift();
}
function detectShake(arr){
  if(arr.length<4) return false;
  let crossings=0, totalAbs=0;
  for(let i=2;i<arr.length;i++){
    const d1 = arr[i-1].v - arr[i-2].v;
    const d2 = arr[i].v   - arr[i-1].v;
    if(d1*d2 < 0 && Math.abs(d1)>0.03 && Math.abs(d2)>0.03) crossings++;
    totalAbs += Math.abs(d2);
  }
  return crossings>=2 && totalAbs>0.5;
}

// ==============================================================
// Resize
// ==============================================================
function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  if(!AI_DRAG.active) resetAIBallHome();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', ()=> setTimeout(onResize,200));

// ==============================================================
// Main loop
// ==============================================================
const clock = new THREE.Clock();
let frames=0, fpsAcc=0;
function loop(){
  const dt = Math.min(0.05, clock.getDelta());
  const speed = 4.8;
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right   = new THREE.Vector3( Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  const wish = new THREE.Vector3();
  wish.addScaledVector(forward, -input.joyY);
  wish.addScaledVector(right,    input.joyX);
  if(wish.lengthSq()>1) wish.normalize();
  const vx = wish.x*speed, vz = wish.z*speed;
  player.vel.y -= 22*dt;
  if(player.vel.y<-30) player.vel.y=-30;
  moveAndCollide(vx*dt, player.vel.y*dt, vz*dt);
  camera.position.set(player.pos.x, player.pos.y+player.eye, player.pos.z);
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
  sky.position.copy(camera.position);
  const sunDir = sun.position.clone().normalize();
  sunDisc.position.copy(camera.position).addScaledVector(sunDir, 140);
  sunGlow.position.copy(sunDisc.position);
  cloudGroup.position.x += dt*0.5;
  if(cloudGroup.position.x>60) cloudGroup.position.x -= 120;

  if(AI_DRAG.active) raycastCrosshair();

  pushShake();
  if(chatPanel.classList.contains('open') && !AI_DRAG.active && document.activeElement!==chatText){
    if(detectShake(shakeYaw) || detectShake(shakePitch)){
      closeChat();
      shakeYaw.length=0; shakePitch.length=0;
    }
  }

  renderer.render(scene, camera);
  frames++; fpsAcc+=dt;
  if(fpsAcc>0.5){ fpsEl.textContent = Math.round(frames/fpsAcc)+' fps'; frames=0; fpsAcc=0; }
  requestAnimationFrame(loop);
}

// ==============================================================
// Init
// ==============================================================
setLoad(1.0,'欢迎来到方块世界');
setTimeout(()=>{
  loadingEl.style.opacity='0';
  setTimeout(()=>loadingEl.style.display='none', 500);
  onResize();
  resetAIBallHome();
  requestAnimationFrame(loop);
  // hint auto-hide
  setTimeout(()=> hintEl.classList.add('hidden'), 10000);
}, 300);
