<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,minimum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MC AI">
<meta name="theme-color" content="#0a0e14">
<meta name="screen-orientation" content="landscape">
<meta name="x5-orientation" content="landscape">
<meta name="full-screen" content="yes">
<meta name="x5-fullscreen" content="true">
<link rel="manifest" href='data:application/manifest+json,{"name":"MC AI Demo","short_name":"MC AI","start_url":".","display":"fullscreen","orientation":"landscape","background_color":"#0a0e14","theme_color":"#0a0e14","icons":[{"src":"data:image/svg+xml;utf8,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 192 192%22%3E%3Crect width=%22192%22 height=%22192%22 fill=%22%234fc3f7%22/%3E%3Ctext x=%2296%22 y=%22120%22 text-anchor=%22middle%22 font-family=%22monospace%22 font-size=%2270%22 font-weight=%22bold%22 fill=%22white%22%3EAI%3C/text%3E%3C/svg%3E","sizes":"192x192","type":"image/svg+xml"}]}'>
<title>MC AI Demo</title>
<style>
:root{
  --accent:#7ed957;
  --accent-2:#4fc3f7;
  --gold:#ffdc50;
  --panel-bg:rgba(18,22,28,0.94);
  --panel-border:rgba(255,255,255,0.12);
}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;color:#eee;touch-action:none;overscroll-behavior:none;}
#app{position:fixed;inset:0;overflow:hidden;}
canvas{display:block;width:100%;height:100%;touch-action:none;}

/* Loading */
#loading{position:fixed;inset:0;background:#0a0e14;display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:opacity .5s;}
#loading .logo{font-size:22px;font-weight:700;letter-spacing:4px;color:var(--accent);text-shadow:0 0 12px rgba(126,217,87,.5);margin-bottom:18px;}
#loading .bar{width:200px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;}
#loading .bar>span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .3s;border-radius:3px;}
#loading .tip{margin-top:12px;font-size:11px;color:#888;letter-spacing:1px;}
#loading .enter-btn{margin-top:22px;padding:10px 28px;border-radius:22px;background:linear-gradient(135deg,#7ed957,#388e3c);border:none;color:#fff;font-size:14px;font-weight:600;letter-spacing:2px;box-shadow:0 4px 12px rgba(126,217,87,.4);cursor:pointer;opacity:0;pointer-events:none;transition:opacity .3s;}
#loading .enter-btn.ready{opacity:1;pointer-events:auto;}
#loading .enter-btn:active{transform:scale(0.96);}
#loading .platform-tip{margin-top:14px;font-size:10px;color:#666;line-height:1.6;text-align:center;max-width:80vw;}

/* Fullscreen toggle mini-button (in-app) */
#fs-btn{position:fixed;right:82px;top:22px;width:34px;height:34px;border-radius:50%;background:rgba(0,0,0,0.55);border:1px solid rgba(255,255,255,0.2);color:#eee;z-index:30;display:flex;align-items:center;justify-content:center;padding:0;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
#fs-btn svg{width:16px;height:16px;fill:currentColor;}
#fs-btn:active{background:rgba(0,0,0,0.75);}

/* Portrait hint */
#rotate-hint{position:fixed;inset:0;background:#0a0e14;z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;color:#ccc;font-size:14px;letter-spacing:1px;}
#rotate-hint .icon{width:60px;height:90px;border:3px solid #7ed957;border-radius:8px;margin-bottom:16px;animation:rot 1.6s infinite ease-in-out;}
@keyframes rot{0%,100%{transform:rotate(0)}50%{transform:rotate(90deg)}}
@media (orientation:portrait){#rotate-hint{display:flex;}}

/* Joystick */
#joystick{position:fixed;left:52px;bottom:36px;width:130px;height:130px;border-radius:50%;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.22);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:20;touch-action:none;}
#joystick .knob{position:absolute;left:50%;top:50%;width:56px;height:56px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#f5f5f5,#a8a8a8);border:2px solid rgba(0,0,0,.35);transform:translate(-50%,-50%);box-shadow:0 4px 10px rgba(0,0,0,.4);pointer-events:none;}

/* Jump */
#jump-btn{position:fixed;right:24px;bottom:32px;width:88px;height:88px;border-radius:50%;background:rgba(126,217,87,.18);border:2px solid rgba(126,217,87,.55);color:#dfffcc;font-size:14px;font-weight:600;letter-spacing:2px;z-index:20;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);touch-action:none;}
#jump-btn:active{background:rgba(126,217,87,.35);}

/* Center crosshair */
#center-cross{position:fixed;left:50%;top:50%;width:14px;height:14px;transform:translate(-50%,-50%);pointer-events:none;z-index:15;opacity:.6;}
#center-cross::before,#center-cross::after{content:"";position:absolute;background:#fff;box-shadow:0 0 2px rgba(0,0,0,.9);}
#center-cross::before{left:50%;top:0;width:2px;height:100%;transform:translateX(-50%);}
#center-cross::after{left:0;top:50%;width:100%;height:2px;transform:translateY(-50%);}

/* AI Ball — five-state glass orb */
#ai-ball{--orb:#79838e;--orb-soft:rgba(121,131,142,.34);position:fixed;top:22px;right:22px;width:60px;height:60px;border-radius:50%;z-index:70;background:radial-gradient(circle at 30% 22%,rgba(255,255,255,.42),transparent 28%),radial-gradient(circle at 50% 62%,var(--orb),#121820 76%);border:1px solid rgba(255,255,255,.36);box-shadow:0 10px 28px rgba(0,0,0,.34),0 0 22px var(--orb-soft),inset 0 1px 1px rgba(255,255,255,.42),inset 0 -10px 20px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;transition:transform .28s cubic-bezier(.2,.8,.2,1),box-shadow .4s ease,background .4s ease;touch-action:none;isolation:isolate;}
#ai-ball::before{content:"";position:absolute;inset:9px;border-radius:50%;background:radial-gradient(circle at 38% 30%,rgba(255,255,255,.42),rgba(255,255,255,.06) 36%,rgba(0,0,0,.18) 72%);border:1px solid rgba(255,255,255,.18);box-shadow:inset 0 0 12px rgba(255,255,255,.08),0 0 13px var(--orb-soft);z-index:1;}
#ai-ball::after{content:"";position:absolute;left:17px;top:11px;width:19px;height:8px;border-radius:50%;background:linear-gradient(180deg,rgba(255,255,255,.62),rgba(255,255,255,0));filter:blur(.4px);transform:rotate(-18deg);z-index:3;opacity:.72;}
#ai-ball .core{position:relative;z-index:2;width:12px;height:12px;border-radius:50%;background:#e5ebef;box-shadow:0 0 7px rgba(255,255,255,.82),0 0 18px var(--orb);transition:transform .35s ease,background .35s ease,box-shadow .35s ease;}
#ai-ball .ring{position:absolute;inset:-6px;border-radius:50%;border:1px solid rgba(255,255,255,.14);pointer-events:none;opacity:.55;transition:opacity .35s ease,transform .35s ease,border-color .35s ease;}
#ai-ball .ring::before,#ai-ball .ring::after{content:"";position:absolute;inset:4px;border-radius:50%;border:1px solid transparent;}
#ai-ball .badge{position:absolute;top:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:#ff665c;border:2px solid #e8edf0;display:none;box-shadow:0 0 10px rgba(255,102,92,.72);z-index:5;}
#ai-ball.has-history .badge{display:block;animation:badgeBreath 2.4s ease-in-out infinite;}
#ai-ball[data-state="idle"]{--orb:#79838e;--orb-soft:rgba(121,131,142,.28);animation:orbIdle 4.2s ease-in-out infinite;}
#ai-ball[data-state="listen"]{--orb:#dd8b38;--orb-soft:rgba(221,139,56,.42);transform:scale(1.035);}
#ai-ball[data-state="listen"] .ring{border-color:rgba(255,184,92,.55);animation:listenWave 1.55s cubic-bezier(.2,.65,.25,1) infinite;}
#ai-ball[data-state="listen"] .ring::before{border-color:rgba(255,190,105,.3);animation:listenWave 1.55s .42s cubic-bezier(.2,.65,.25,1) infinite;}
#ai-ball[data-state="sense"]{--orb:#8b68d8;--orb-soft:rgba(139,104,216,.48);transform:scale(1.07);}
#ai-ball[data-state="sense"] .ring{opacity:1;border-top-color:#d9c8ff;border-right-color:rgba(217,200,255,.16);border-bottom-color:#8e6ee2;border-left-color:rgba(142,110,226,.16);animation:senseScan 1.35s linear infinite;}
#ai-ball[data-state="sense"] .ring::after{inset:-4px;border-top-color:rgba(217,200,255,.34);border-bottom-color:rgba(139,104,216,.16);animation:senseScan 2.4s linear infinite reverse;}
#ai-ball[data-state="think"]{--orb:#3f8ed8;--orb-soft:rgba(63,142,216,.5);}
#ai-ball[data-state="think"] .core{animation:thinkCore 1.05s ease-in-out infinite;}
#ai-ball[data-state="think"] .ring{opacity:1;border-top-color:#bde7ff;border-right-color:#4ba3ed;border-bottom-color:rgba(75,163,237,.12);animation:senseScan .82s cubic-bezier(.55,.1,.45,.9) infinite;}
#ai-ball[data-state="active"]{--orb:#54a968;--orb-soft:rgba(84,169,104,.42);animation:activeBloom 2.8s ease-in-out infinite;}
#ai-ball[data-state="active"] .ring{border-color:rgba(145,231,157,.42);opacity:.82;}
#ai-ball[data-state="active"] .core{background:#eaffea;box-shadow:0 0 8px rgba(234,255,234,.92),0 0 22px #62c679;}
@keyframes orbIdle{0%,100%{transform:scale(.985);filter:saturate(.78);}50%{transform:scale(1);filter:saturate(.96);}}
@keyframes listenWave{0%{transform:scale(.82);opacity:.76;}75%,100%{transform:scale(1.28);opacity:0;}}
@keyframes senseScan{to{transform:rotate(360deg);}}
@keyframes thinkCore{0%,100%{transform:scale(.65);opacity:.65;}50%{transform:scale(1.2);opacity:1;}}
@keyframes activeBloom{0%,100%{box-shadow:0 10px 28px rgba(0,0,0,.34),0 0 18px var(--orb-soft),inset 0 1px 1px rgba(255,255,255,.42),inset 0 -10px 20px rgba(0,0,0,.3);}50%{box-shadow:0 10px 28px rgba(0,0,0,.34),0 0 29px var(--orb-soft),inset 0 1px 1px rgba(255,255,255,.42),inset 0 -10px 20px rgba(0,0,0,.3);}}
@keyframes badgeBreath{0%,100%{transform:scale(.88);opacity:.75;}50%{transform:scale(1.08);opacity:1;}}

/* Drag crosshair (above finger) */
#drag-cross{position:fixed;width:60px;height:60px;pointer-events:none;z-index:58;display:none;transform:translate(-50%,-50%);}
#drag-cross svg{width:100%;height:100%;filter:drop-shadow(0 0 8px rgba(255,220,80,1));}

/* Voice bubble */
#voice-bubble{position:fixed;top:22px;right:92px;left:auto;max-width:200px;padding:10px 16px;border-radius:16px 16px 4px 16px;background:rgba(0,0,0,.8);border:1px solid rgba(126,217,87,.55);color:#eaffd6;font-size:14px;line-height:1.4;z-index:65;display:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);text-align:left;white-space:normal;box-shadow:0 8px 22px rgba(0,0,0,.5),0 0 16px rgba(126,217,87,.28);}
#voice-bubble .mic{display:inline-block;width:8px;height:8px;border-radius:50%;background:#ef5350;margin-right:8px;vertical-align:middle;animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.35);}}
#voice-bubble .txt{vertical-align:middle;}

/* Block name label */
#block-label{position:fixed;left:50%;top:36%;transform:translate(-50%,-50%);padding:6px 16px;background:rgba(0,0,0,.82);border:1px solid rgba(255,220,80,.75);color:#fff8d0;border-radius:6px;font-size:15px;font-weight:600;letter-spacing:1px;z-index:57;display:none;pointer-events:none;text-shadow:0 1px 2px #000;}

/* Chat panel — full-height right side, flush to top-right, overlaps AI ball */
#chat-panel{position:fixed;top:22px;right:22px;bottom:14px;width:min(380px,78vw);max-width:380px;background:rgba(15,22,18,0.94);border:1px solid rgba(255,255,255,0.1);border-radius:14px;z-index:55;display:none;flex-direction:column;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 8px 28px rgba(0,0,0,.55);transform-origin:top right;animation:panelIn .22s ease-out;}
#chat-panel.open{display:flex;}
@keyframes panelIn{from{opacity:0;transform:scale(0.92) translateY(-6px);}to{opacity:1;transform:scale(1) translateY(0);}}
#chat-close{position:absolute;top:8px;left:8px;width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#ccc;font-size:14px;line-height:1;z-index:2;display:flex;align-items:center;justify-content:center;padding:0;}
#chat-close:active{background:rgba(255,255,255,0.16);}

#chat-panel .chat-body{flex:1;overflow-y:auto;padding:78px 12px 8px;-webkit-overflow-scrolling:touch;}
#chat-panel .chat-body::-webkit-scrollbar{width:4px;}
#chat-panel .chat-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:2px;}

#chat-panel .empty-state{color:#78909c;text-align:center;padding:24px 12px;font-size:12px;line-height:1.7;}
#chat-panel .empty-state .big{font-size:14px;color:#b0bec5;margin-bottom:8px;font-weight:600;}

/* Message row */
.msg{margin:12px 0;display:flex;align-items:flex-start;gap:8px;}
.msg.user{justify-content:flex-end;}
.msg .avatar{width:34px;height:34px;flex-shrink:0;image-rendering:pixelated;border-radius:4px;overflow:hidden;background-size:cover;background-position:center;background-repeat:no-repeat;}
.msg .bubble{min-width:0;}
.msg.user .bubble{max-width:calc(100% - 46px);}
.msg.ai .bubble{max-width:calc(100% - 46px);flex:1;}

/* User bubble (green pill) */
.msg.user .bubble{background:#2e7d32;color:#fff;padding:9px 16px;border-radius:18px;font-size:13px;line-height:1.4;word-wrap:break-word;overflow-wrap:break-word;font-weight:500;}
.msg.user .bubble.no-content{padding:0;background:transparent;}

/* AI thinking bubble */
.msg.ai .bubble.thinking{background:rgba(255,255,255,0.06);color:#b0bec5;padding:8px 14px;border-radius:14px;font-style:italic;font-size:12px;border:1px solid rgba(255,255,255,0.08);flex:0 0 auto;align-self:flex-start;width:auto;min-width:110px;max-width:100%;white-space:nowrap;}
.msg.ai .bubble.thinking .dots span{display:inline-block;width:5px;height:5px;background:#7ed957;border-radius:50%;margin:0 1px;animation:thk 1.2s infinite ease-in-out;}
.msg.ai .bubble.thinking .dots span:nth-child(2){animation-delay:0.15s;}
.msg.ai .bubble.thinking .dots span:nth-child(3){animation-delay:0.3s;}
@keyframes thk{0%,80%,100%{opacity:0.25;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}

/* Card base (dark green panel) */
.card{background:#141a15;border-radius:10px;padding:12px;color:#e8e8e8;font-size:12px;line-height:1.55;}
.card .card-head{background:#000;padding:8px 14px;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.card .card-head .name{font-size:16px;font-weight:800;color:#fff;letter-spacing:2px;}
.card .card-head .tag{padding:3px 10px;background:rgba(255,255,255,0.1);border-radius:4px;font-size:11px;color:#ccc;letter-spacing:1px;}
.card .k{color:#7ed957;font-weight:600;}

/* Choice buttons */
.card .opt{width:100%;padding:12px 16px;background:#2e7d32;border:none;border-radius:6px;color:#fff;font-size:15px;font-weight:600;display:flex;align-items:center;gap:12px;margin-top:8px;text-align:left;cursor:pointer;letter-spacing:1px;transition:background .15s;}
.card .opt:active{background:#388e3c;}
.card .opt .oi{width:22px;height:22px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;}
.card .opt .oi svg{width:100%;height:100%;fill:currentColor;}

/* Info card body */
.info-body{display:flex;gap:12px;margin-bottom:2px;padding:4px 2px;}
.info-body .thumb{width:70px;height:70px;background:rgba(255,255,255,0.06);border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px;}
.info-body .thumb canvas,.info-body .thumb img{image-rendering:pixelated;image-rendering:-moz-crisp-edges;width:100%;height:100%;object-fit:contain;}
.info-body .desc{flex:1;color:#e0e0e0;padding-top:4px;font-size:12px;line-height:1.55;}

.stats-row{margin-top:8px;padding:10px 12px;background:rgba(0,0,0,0.35);border-radius:6px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.stats-row .label{color:#7ed957;font-size:13px;font-weight:600;flex-shrink:0;letter-spacing:.5px;}
.stats-row .val{display:flex;gap:2px;align-items:center;font-size:11px;color:#ccc;flex-wrap:wrap;justify-content:flex-end;}
.hearts{display:inline-flex;gap:1px;}
.hearts svg{width:13px;height:13px;}
.stats-row .num{margin-left:8px;font-family:monospace;color:#fff;font-size:13px;font-weight:600;}

.drops-row{margin-top:8px;padding:10px 12px;background:rgba(0,0,0,0.35);border-radius:6px;}
.drops-row .label{color:#7ed957;font-size:13px;font-weight:600;margin-bottom:8px;letter-spacing:.5px;}
.drops-list{display:flex;gap:14px;flex-wrap:wrap;}
.drop{text-align:center;}
.drop .icon-wrap{width:44px;height:44px;background:rgba(0,0,0,0.4);border-radius:5px;position:relative;margin:0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:3px;}
.drop .icon-wrap canvas,.drop .icon-wrap img{image-rendering:pixelated;width:100%;height:100%;object-fit:contain;}
.drop .icon-wrap .count{position:absolute;bottom:1px;right:3px;font-size:10px;color:#fff;font-family:monospace;font-weight:700;text-shadow:1px 1px 0 #000,-1px 1px 0 #000,1px -1px 0 #000,-1px -1px 0 #000;}
.drop .lbl{font-size:11px;color:#ccc;margin-top:4px;letter-spacing:.5px;}

.loc-row{margin-top:8px;padding:10px 12px;background:rgba(0,0,0,0.35);border-radius:6px;}
.loc-row .title{color:#7ed957;font-size:13px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:5px;letter-spacing:.5px;}
.loc-row .title svg{width:13px;height:13px;fill:#7ed957;}
.loc-row .text{font-size:12px;line-height:1.7;color:#ddd;}

/* Guide card */
.guide-sec{margin-bottom:10px;}
.guide-sec:last-child{margin-bottom:0;}
.guide-sec .sec-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:6px;padding:6px 12px;background:rgba(0,0,0,0.35);border-radius:4px;letter-spacing:1px;}
.guide-sec .sec-text{font-size:12px;line-height:1.7;color:#e0e0e0;padding:2px 4px;}
.guide-action{margin-top:12px;text-align:right;}
.guide-action button{background:#2e7d32;color:#fff;padding:8px 18px;border-radius:6px;border:none;font-size:13px;font-weight:600;letter-spacing:1px;cursor:pointer;}
.guide-action button:active{background:#388e3c;}

/* Foot */
#chat-panel .chat-foot{padding:10px 10px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:8px;align-items:center;flex-shrink:0;background:rgba(0,0,0,0.2);border-radius:0 0 14px 14px;}
#chat-panel .chat-foot .sel-chip{background:#2e7d32;color:#fff;padding:7px 12px;border-radius:14px;font-size:12px;font-weight:600;flex-shrink:0;letter-spacing:.5px;display:none;white-space:nowrap;}
#chat-panel .chat-foot .sel-chip.on{display:block;}
#chat-panel .chat-foot input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#eee;padding:8px 14px;border-radius:16px;font-size:12.5px;outline:none;font-family:inherit;user-select:text;-webkit-user-select:text;min-width:0;}
#chat-panel .chat-foot input:focus{border-color:rgba(126,217,87,0.5);}
#chat-panel .chat-foot input::placeholder{color:#78909c;}
#chat-panel .chat-foot .mic{width:42px;height:34px;border-radius:8px;background:linear-gradient(135deg,#7ed957,#388e3c);border:none;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;cursor:pointer;}
#chat-panel .chat-foot .mic svg{width:18px;height:18px;fill:currentColor;}
#chat-panel .chat-foot .mic:active{transform:scale(0.94);}
#chat-panel .chat-foot .mic.rec{background:linear-gradient(135deg,#ef5350,#c62828);animation:pulse 1s infinite;}

/* Hint */
#hint{position:fixed;left:12px;top:12px;font-size:10px;color:rgba(255,255,255,.55);z-index:10;line-height:1.6;letter-spacing:.5px;pointer-events:none;text-shadow:0 1px 2px rgba(0,0,0,.9);max-width:60%;}
#hint b{color:var(--accent);}
#hint.hidden{opacity:0;transition:opacity .5s;}

/* FPS mini */
#fps{position:fixed;left:12px;bottom:170px;font-size:10px;color:rgba(255,255,255,.35);z-index:5;font-family:monospace;display:none;}

/* ===== 12态 × 13操作 演示层 ===== */
/* 主动气泡 (S-03 / S-07) — 悬浮球旁一句话胶囊 */
#proactive-bubble{position:fixed;z-index:75;max-width:230px;padding:10px 14px;border-radius:16px 16px 4px 16px;
  background:rgba(18,24,20,.94);border:1px solid rgba(126,217,87,.5);color:#eaffea;font-size:13px;line-height:1.5;
  box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 18px rgba(126,217,87,.28);display:none;transform-origin:top right;
  animation:bubbleIn .32s cubic-bezier(.2,.9,.25,1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
#proactive-bubble.sense{border-color:rgba(139,104,216,.55);box-shadow:0 8px 24px rgba(0,0,0,.5),0 0 18px rgba(139,104,216,.3);color:#efe8ff;}
#proactive-bubble .pb-txt{margin-bottom:8px;}
#proactive-bubble .pb-acts{display:flex;gap:8px;}
#proactive-bubble .pb-btn{flex:1;padding:6px 0;border-radius:9px;border:none;font-size:12px;font-weight:600;letter-spacing:1px;}
#proactive-bubble .pb-yes{background:linear-gradient(135deg,#7ed957,#3f9e42);color:#fff;}
#proactive-bubble .pb-no{background:rgba(255,255,255,.1);color:#aab;}
#proactive-bubble .pb-hint{margin-top:6px;font-size:9px;color:#889;letter-spacing:.5px;}
@keyframes bubbleIn{from{opacity:0;transform:scale(.7) translateY(-6px);}to{opacity:1;transform:scale(1);}}
/* 滑走 / 收起动效 */
#proactive-bubble.leaving,#float-card.leaving{animation:none;transition:transform .28s cubic-bezier(.4,0,.6,1),opacity .28s ease;
  transform:translateX(135%) scale(.92);opacity:0;pointer-events:none;}
#proactive-bubble.settling,#float-card.settling{transition:transform .18s ease;}

/* 浮动卡片 (S-04) */
#float-card{position:fixed;z-index:74;width:250px;max-width:78vw;padding:14px;border-radius:14px;
  background:rgba(16,20,26,.96);border:1px solid rgba(79,195,247,.4);color:#e8eef4;font-size:12px;line-height:1.55;
  box-shadow:0 12px 34px rgba(0,0,0,.55),0 0 20px rgba(79,195,247,.2);display:none;
  animation:bubbleIn .3s cubic-bezier(.2,.9,.25,1);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
#float-card .fc-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:14px;font-weight:700;color:var(--gold);}
#float-card .fc-thumb{width:26px;height:26px;border-radius:5px;background:#2a3340;flex:none;}
#float-card .fc-body b{color:var(--accent);}
#float-card .fc-btn{margin-top:10px;width:100%;padding:8px 0;border-radius:9px;border:none;font-size:12px;font-weight:600;
  background:linear-gradient(135deg,#4fc3f7,#2b8fc4);color:#fff;letter-spacing:1px;}
#float-card .fc-hint{margin-top:6px;font-size:9px;color:#7a8694;text-align:center;}

/* 次级菜单 (OP-05 / OP-08 / OP-12) */
#ctx-menu{position:fixed;z-index:80;min-width:150px;padding:5px;border-radius:10px;background:rgba(22,26,32,.98);
  border:1px solid rgba(255,255,255,.14);box-shadow:0 10px 30px rgba(0,0,0,.6);display:none;}
#ctx-menu .cm-item{padding:9px 12px;border-radius:7px;font-size:12px;color:#dde;cursor:pointer;}
#ctx-menu .cm-item:active{background:rgba(255,255,255,.1);}
#ctx-menu .cm-item.danger{color:#ff8a80;}

/* tooltip (OP-11 悬停) */
#hover-tip{position:fixed;z-index:82;padding:5px 9px;border-radius:6px;background:rgba(0,0,0,.85);
  color:#eee;font-size:11px;display:none;pointer-events:none;white-space:nowrap;}

/* 抑制态 (S-12) — 全部AI浮层半透明 */
body.ai-suppressed #ai-ball,body.ai-suppressed #proactive-bubble,body.ai-suppressed #float-card,
body.ai-suppressed #chat-panel{opacity:.32 !important;filter:saturate(.4);transition:opacity .4s;}
#suppress-banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:83;
  padding:8px 18px;border-radius:20px;background:rgba(180,40,40,.85);color:#fff;font-size:12px;font-weight:600;
  letter-spacing:2px;display:none;box-shadow:0 4px 16px rgba(200,0,0,.5);}

/* 状态监视器 已移除 */

/* 模拟事件面板 */
#sim-toggle{position:fixed;left:12px;top:12px;z-index:61;padding:8px 16px;border-radius:20px;

  display:none;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);}
#sim-panel.open{display:block;animation:bubbleIn .25s ease;}
#sim-panel .sp-title{font-size:10px;letter-spacing:2px;color:#7a8694;margin-bottom:9px;}
#sim-panel .sp-btn{display:block;width:100%;text-align:left;padding:9px 11px;margin-bottom:6px;border-radius:8px;

</style>

<script type="module" id="main-script">
import * as THREE from 'three';

// ==============================================================
// DOM refs
// ==============================================================
const app        = document.getElementById('app');
const loadingEl  = document.getElementById('loading');
const loadBar    = document.getElementById('load-bar');
const loadTip    = document.getElementById('load-tip');
const joystick   = document.getElementById('joystick');
const joyKnob    = document.getElementById('joy-knob');
const jumpBtn    = document.getElementById('jump-btn');
const aiBall     = document.getElementById('ai-ball');
const dragCross  = document.getElementById('drag-cross');
const voiceBubble= document.getElementById('voice-bubble');
const voiceTxt   = document.getElementById('voice-txt');
const blockLabel = document.getElementById('block-label');
const chatPanel  = document.getElementById('chat-panel');
const chatBody   = document.getElementById('chat-body');
const emptyState = document.getElementById('empty-state');
const chatText   = document.getElementById('chat-text');
const chatClose  = document.getElementById('chat-close');
const selChip    = document.getElementById('sel-chip');
const micBtn     = document.getElementById('mic-btn');
const hintEl     = document.getElementById('hint');
const fpsEl      = document.getElementById('fps');

const setLoad = (p,tip)=>{ loadBar.style.width=(p*100)+'%'; if(tip) loadTip.textContent=tip; };

// 语音气泡贴着悬浮球左侧展开
function placeVoiceNearBall(){
  const r = aiBall.getBoundingClientRect();
  voiceBubble.style.left = 'auto';
  voiceBubble.style.right = (window.innerWidth - r.left + 10) + 'px';
  voiceBubble.style.top = r.top + 'px';
}

// ==============================================================
// Fullscreen + platform detection
// ==============================================================
const enterBtn = document.getElementById('enter-btn');
const platformTip = document.getElementById('platform-tip');
const fsBtn = document.getElementById('fs-btn');
const ua = navigator.userAgent;
const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

function canRequestFS(){
  const el = document.documentElement;
  return !!(el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen);
}
function requestFS(){
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
  if(fn){ try{ fn.call(el); }catch(e){} }
  // Lock landscape if possible
  if(screen.orientation && screen.orientation.lock){
    screen.orientation.lock('landscape').catch(()=>{});
  }
}
function exitFS(){
  const fn = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
  if(fn){ try{ fn.call(document); }catch(e){} }
}
function isFS(){
  return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement);
}

// Setup enter button + platform hint on load screen
function setupEnterFlow(){
  const bindEnter = (fn)=>{
    let fired = false;
    const wrap = (e)=>{
      if(fired) return; fired = true;
      if(e && e.preventDefault) e.preventDefault();
      if(e && e.stopPropagation) e.stopPropagation();
      fn();
    };
    enterBtn.addEventListener('click', wrap);
    enterBtn.addEventListener('touchend', wrap, {passive:false});
  };
  if(isIOS && !isStandalone){
    platformTip.innerHTML = 'iOS Safari 无法通过按钮全屏。<br>请点浏览器分享 → <b>添加到主屏幕</b>，从图标启动即全屏无栏。';
    enterBtn.textContent = '直接进入';
    bindEnter(hideLoading);
  } else if(isStandalone){
    platformTip.textContent = '已在独立模式运行';
    enterBtn.textContent = '进入';
    bindEnter(hideLoading);
  } else if(canRequestFS()){
    platformTip.innerHTML = '进入后浏览器地址栏隐藏。<br>横屏效果最佳。';
    bindEnter(()=>{ requestFS(); hideLoading(); });
  } else {
    platformTip.textContent = '此浏览器不支持全屏 API，直接进入';
    enterBtn.textContent = '进入';
    bindEnter(hideLoading);
  }
}

function hideLoading(){
  loadingEl.style.opacity='0';
  setTimeout(()=>loadingEl.style.display='none', 500);
}

// In-app fullscreen toggle button
fsBtn.addEventListener('click', e=>{
  e.stopPropagation();
  if(isFS()) exitFS(); else requestFS();
});
// Hide FS button in standalone mode (no need)
if(isStandalone || isIOS){ fsBtn.style.display='none'; }
document.addEventListener('fullscreenchange', ()=>{
  fsBtn.title = isFS() ? '退出全屏' : '进入全屏';
});

// ==============================================================
// Procedural 16x16 textures — MC style
// ==============================================================
function makeTex(drawFn){
  const c=document.createElement('canvas'); c.width=16; c.height=16;
  const ctx=c.getContext('2d'); ctx.imageSmoothingEnabled=false;
  drawFn(ctx);
  const t=new THREE.CanvasTexture(c);
  t.magFilter=THREE.NearestFilter;
  t.minFilter=THREE.NearestMipmapLinearFilter;
  t.wrapS=t.wrapT=THREE.RepeatWrapping;
  t.colorSpace=THREE.SRGBColorSpace;
  t.generateMipmaps=true;
  return t;
}
function fillBase(ctx,c){ ctx.fillStyle=c; ctx.fillRect(0,0,16,16); }
function speckle(ctx,c,n){ ctx.fillStyle=c; for(let i=0;i<n;i++) ctx.fillRect((Math.random()*16)|0,(Math.random()*16)|0,1,1); }

const T={};
T.grassTop = makeTex(ctx=>{
  fillBase(ctx,'#5eb04a');
  speckle(ctx,'#4a9a3a',28);
  speckle(ctx,'#78c465',22);
  speckle(ctx,'#3d8730',10);
  speckle(ctx,'#82d06a',8);
});
T.dirt = makeTex(ctx=>{
  fillBase(ctx,'#8b5a2b');
  speckle(ctx,'#6d4620',30);
  speckle(ctx,'#a06e3d',22);
  speckle(ctx,'#5a3a1a',12);
});
T.grassSide = makeTex(ctx=>{
  fillBase(ctx,'#8b5a2b');
  speckle(ctx,'#6d4620',22);
  speckle(ctx,'#a06e3d',16);
  speckle(ctx,'#5a3a1a',8);
  ctx.fillStyle='#5eb04a';
  for(let x=0;x<16;x++){ ctx.fillRect(x,0,1,3+((Math.random()*3)|0)); }
  ctx.fillStyle='#4a9a3a';
  for(let x=0;x<16;x++) if(Math.random()<0.45) ctx.fillRect(x,(Math.random()*4)|0,1,1);
  ctx.fillStyle='#78c465';
  for(let x=0;x<16;x++) if(Math.random()<0.28) ctx.fillRect(x,(Math.random()*3)|0,1,1);
});
T.stone = makeTex(ctx=>{
  fillBase(ctx,'#7f7f7f');
  speckle(ctx,'#6a6a6a',38); speckle(ctx,'#909090',24);
  speckle(ctx,'#555',8); speckle(ctx,'#a5a5a5',10);
});
T.cobble = makeTex(ctx=>{
  fillBase(ctx,'#5a5a5a');
  const chunks=[[0,0,7,6],[8,0,7,5],[0,7,4,5],[5,7,6,4],[12,6,4,6],[0,13,7,3],[8,12,8,4]];
  chunks.forEach(([x,y,w,h])=>{
    ctx.fillStyle='#8a8a8a'; ctx.fillRect(x,y,w,h);
    ctx.fillStyle='#a0a0a0'; ctx.fillRect(x,y,w,1); ctx.fillRect(x,y,1,h);
    ctx.fillStyle='#555'; ctx.fillRect(x+w-1,y,1,h); ctx.fillRect(x,y+h-1,w,1);
    ctx.fillStyle='#6a6a6a';
    for(let i=0;i<3;i++) ctx.fillRect(x+1+((Math.random()*(w-2))|0),y+1+((Math.random()*(h-2))|0),1,1);
  });
});
T.logSide = makeTex(ctx=>{
  fillBase(ctx,'#6b4a2a');
  for(let x=0;x<16;x++){
    ctx.fillStyle=Math.random()<0.4?'#553a20':(Math.random()<0.5?'#7a5a35':'#6b4a2a');
    ctx.fillRect(x,0,1,16);
  }
  speckle(ctx,'#3a2812',18); speckle(ctx,'#8a6a40',10);
  for(let i=0;i<2;i++){
    const x=2+((Math.random()*12)|0), y=2+((Math.random()*12)|0);
    ctx.fillStyle='#3a2812'; ctx.fillRect(x,y,2,2);
    ctx.fillStyle='#553a20'; ctx.fillRect(x,y,1,1);
  }
});
T.logTop = makeTex(ctx=>{
  fillBase(ctx,'#b48a58');
  ctx.strokeStyle='#8a6035'; ctx.lineWidth=1;
  for(let r=1.5;r<8;r+=1.8){ ctx.beginPath(); ctx.arc(8,8,r,0,Math.PI*2); ctx.stroke(); }
  speckle(ctx,'#8a6035',12); speckle(ctx,'#c9a070',8);
  ctx.fillStyle='#5a3818'; ctx.fillRect(7,7,2,2);
});
T.leaves = makeTex(ctx=>{
  fillBase(ctx,'#2a5a1c');
  speckle(ctx,'#1c3d14',42); speckle(ctx,'#3a7a2a',36);
  speckle(ctx,'#4d9a35',22); speckle(ctx,'#5cb040',10);
  for(let i=0;i<10;i++){ ctx.fillStyle='#132a0d'; ctx.fillRect((Math.random()*16)|0,(Math.random()*16)|0,1,1); }
});
T.planks = makeTex(ctx=>{
  const rows=[0,4,8,12];
  rows.forEach((y,i)=>{
    ctx.fillStyle=(i%2)?'#a07040':'#8f5f30'; ctx.fillRect(0,y,16,4);
    ctx.fillStyle='#5a3818'; ctx.fillRect(0,y+3,16,1);
    for(let x=0;x<16;x++){
      if(Math.random()<0.25){
        ctx.fillStyle=Math.random()<0.5?'#7a5028':'#b58048';
        ctx.fillRect(x,y+((Math.random()*3)|0),1,1);
      }
    }
    const seam=(i*5+3)%16;
    ctx.fillStyle='#5a3818'; ctx.fillRect(seam,y,1,4);
    ctx.fillStyle='#c89060'; ctx.fillRect(0,y,16,1);
  });
});
T.glass = makeTex(ctx=>{
  ctx.clearRect(0,0,16,16);
  ctx.fillStyle='rgba(180,220,240,0.18)'; ctx.fillRect(0,0,16,16);
  ctx.strokeStyle='#cfe6f2'; ctx.lineWidth=1;
  ctx.strokeRect(0.5,0.5,15,15);
  ctx.strokeRect(2.5,2.5,11,11);
  ctx.fillStyle='#e0f0f8'; ctx.fillRect(0,0,16,1); ctx.fillRect(0,0,1,16);
  ctx.fillStyle='rgba(255,255,255,0.5)'; ctx.fillRect(3,3,3,1); ctx.fillRect(3,3,1,3);
});
function oreTex(oreColor,oreLight){
  return makeTex(ctx=>{
    fillBase(ctx,'#7f7f7f');
    speckle(ctx,'#6a6a6a',30); speckle(ctx,'#909090',18); speckle(ctx,'#555',6);
    const centers=[[4,4],[11,5],[7,12]];
    centers.forEach(([cx,cy])=>{

const world = new Map();
const keyOf = (x,y,z)=> x+','+y+','+z;

const getB = (x,y,z)=> world.get(keyOf(x,y,z));
const delB = (x,y,z)=> world.delete(keyOf(x,y,z));
const R = 22;

// Base ground
for(let x=-R;x<=R;x++)for(let z=-R;z<=R;z++){
  setB(x,-1,z,'grass');
  setB(x,-2,z,'dirt');
  setB(x,-3,z,'dirt');
  setB(x,-4,z,'stone');
  setB(x,-5,z,'bedrock');
}

// Hills
function hill(cx,cz,r){
  for(let x=cx-r-1;x<=cx+r+1;x++)for(let z=cz-r-1;z<=cz+r+1;z++){
    const d=Math.hypot(x-cx,z-cz);
    if(x<-R||x>R||z<-R||z>R) continue;
    if(d<r){ setB(x,0,z,'grass'); setB(x,-1,z,'dirt'); }
    if(d<r-1.2){ setB(x,1,z,'grass'); setB(x,0,z,'dirt'); }
    if(d<r-2.4){ setB(x,2,z,'grass'); setB(x,1,z,'dirt'); }
    if(d<r-3.2){ setB(x,3,z,'grass'); setB(x,2,z,'dirt'); }
  }
}

// Small pond (water)
function pond(cx,cz){
  for(let x=cx-2;x<=cx+2;x++)for(let z=cz-2;z<=cz+2;z++){
    if(Math.hypot(x-cx,z-cz)<2.3){
      delB(x,-1,z);
      setB(x,-1,z,'water');
      setB(x,-2,z,'dirt');
    }
  }
  // sand rim
  for(let x=cx-3;x<=cx+3;x++)for(let z=cz-3;z<=cz+3;z++){
    const d=Math.hypot(x-cx,z-cz);
    if(d>=2.3 && d<3.2 && getB(x,-1,z)==='grass') setB(x,-1,z,'sand');
  }
}

// trees
function tree(x,z){
  let by=0; while(getB(x,by,z)) by++;
  const bottom=by, top=bottom+4;
  for(let i=0;i<4;i++) setB(x,bottom+i,z,'log');
  for(let dx=-2;dx<=2;dx++)for(let dz=-2;dz<=2;dz++){
    if(dx===0&&dz===0) continue;
    if(Math.abs(dx)===2&&Math.abs(dz)===2 && Math.random()<0.6) continue;
    if(!getB(x+dx,top-1,z+dz)) setB(x+dx,top-1,z+dz,'leaves');
    if(!getB(x+dx,top,z+dz))   setB(x+dx,top,z+dz,'leaves');
  }
  for(let dx=-1;dx<=1;dx++)for(let dz=-1;dz<=1;dz++){
    if(!getB(x+dx,top+1,z+dz)) setB(x+dx,top+1,z+dz,'leaves');
  }
  if(!getB(x,top+2,z)) setB(x,top+2,z,'leaves');
  setB(x,top,z,'log');
  setB(x,top+1,z,'log');
}

// House
function house(x0,z0){
  const w=7,d=6,h=4;
  for(let x=x0;x<x0+w;x++)for(let z=z0;z<z0+d;z++) setB(x,0,z,'planks');
  for(let y=1;y<=h;y++){
    for(let x=x0;x<x0+w;x++){ setB(x,y,z0,'planks'); setB(x,y,z0+d-1,'planks'); }
    for(let z=z0;z<z0+d;z++){ setB(x0,y,z,'planks'); setB(x0+w-1,y,z,'planks'); }
  }
  for(let y=1;y<=h;y++){
    setB(x0,y,z0,'log'); setB(x0+w-1,y,z0,'log');
    setB(x0,y,z0+d-1,'log'); setB(x0+w-1,y,z0+d-1,'log');
  }
  // stepped roof
  for(let x=x0-1;x<=x0+w;x++)for(let z=z0-1;z<=z0+d;z++) setB(x,h+1,z,'planks');
  for(let x=x0;x<x0+w;x++)for(let z=z0;z<z0+d;z++) if(Math.random()<0.9) setB(x,h+2,z,'planks');
  // door
  delB(x0+3,1,z0); delB(x0+3,2,z0);
  // windows
  setB(x0+1,2,z0,'glass'); setB(x0+5,2,z0,'glass');
  setB(x0,2,z0+2,'glass'); setB(x0+w-1,2,z0+3,'glass');
  setB(x0+2,2,z0+d-1,'glass'); setB(x0+4,2,z0+d-1,'glass');
  // path
  for(let i=1;i<=5;i++) setB(x0+3,-1,z0-i,'cobble');
  // chimney
  for(let y=1;y<=h+3;y++) setB(x0+w-2,y,z0+d-2,'cobble');
}

// Ore piles
function orePile(cx,cz,ore,size){
  const cells=[];
  for(let dx=-size;dx<=size;dx++)for(let dz=-size;dz<=size;dz++){
    if(Math.hypot(dx,dz)<=size+0.3) cells.push([dx,dz]);
  }
  cells.forEach(([dx,dz])=>{
    if(Math.random()<0.8) setB(cx+dx,0,cz+dz,Math.random()<0.55?ore:'stone');
    if(Math.abs(dx)<=1&&Math.abs(dz)<=1&&Math.random()<0.7) setB(cx+dx,1,cz+dz,Math.random()<0.5?ore:'cobble');
  });
  setB(cx,0,cz,ore); setB(cx,1,cz,ore);
}

{

    });
    im.instanceMatrix.needsUpdate=true;
    im.castShadow = (type!=='water' && type!=='glass' && type!=='bedrock');
    im.receiveShadow = true;
    im.frustumCulled = false;
    scene.add(im);

const player = {
  pos: new THREE.Vector3(0, 0, 15),
  vel: new THREE.Vector3(),
  yaw: 0, pitch: -0.15,
  onGround: false,
  r: 0.3, h: 1.75, eye: 1.6,
};

function isSolidBlock(x,y,z){
  const b = world.get(keyOf(x,y,z));
  if(!b) return false;
  if(b==='leaves'||b==='water') return false;
  return true;
}

const WORLD_MIN = -R + 0.5, WORLD_MAX = R + 0.5;

function moveAndCollide(dx,dy,dz){
  const r=player.r, h=player.h;
  if(dx!==0){
    player.pos.x += dx;
    const y0=Math.floor(player.pos.y+0.01), y1=Math.floor(player.pos.y+h-0.01);
    const z0=Math.floor(player.pos.z-r), z1=Math.floor(player.pos.z+r);
    for(let y=y0;y<=y1;y++)for(let z=z0;z<=z1;z++){
      if(dx>0){
        const bx=Math.floor(player.pos.x+r);
        if(isSolidBlock(bx,y,z)){ player.pos.x = bx - r - 1e-3; }
      } else {
        const bx=Math.floor(player.pos.x-r);
        if(isSolidBlock(bx,y,z)){ player.pos.x = bx + 1 + r + 1e-3; }
      }
    }
  }
  if(dz!==0){
    player.pos.z += dz;
    const y0=Math.floor(player.pos.y+0.01), y1=Math.floor(player.pos.y+h-0.01);
    const x0=Math.floor(player.pos.x-r), x1=Math.floor(player.pos.x+r);
    for(let y=y0;y<=y1;y++)for(let x=x0;x<=x1;x++){
      if(dz>0){
        const bz=Math.floor(player.pos.z+r);
        if(isSolidBlock(x,y,bz)){ player.pos.z = bz - r - 1e-3; }
      } else {
        const bz=Math.floor(player.pos.z-r);
        if(isSolidBlock(x,y,bz)){ player.pos.z = bz + 1 + r + 1e-3; }
      }
    }
  }
  player.pos.y += dy;
  {
    const x0=Math.floor(player.pos.x-r), x1=Math.floor(player.pos.x+r);
    const z0=Math.floor(player.pos.z-r), z1=Math.floor(player.pos.z+r);
    if(dy<=0){
      const by=Math.floor(player.pos.y);
      let landed=false;
      for(let x=x0;x<=x1;x++)for(let z=z0;z<=z1;z++){
        if(isSolidBlock(x,by,z)){ player.pos.y = by+1; player.vel.y=0; player.onGround=true; landed=true; }
      }
      if(!landed) player.onGround=false;
    } else {
      const by=Math.floor(player.pos.y+h);
      for(let x=x0;x<=x1;x++)for(let z=z0;z<=z1;z++){
        if(isSolidBlock(x,by,z)){ player.pos.y = by - h - 1e-3; player.vel.y=0; }
      }
    }
  }
  if(player.pos.x<WORLD_MIN) player.pos.x=WORLD_MIN;
  if(player.pos.x>WORLD_MAX) player.pos.x=WORLD_MAX;
  if(player.pos.z<WORLD_MIN) player.pos.z=WORLD_MIN;
  if(player.pos.z>WORLD_MAX) player.pos.z=WORLD_MAX;
  if(player.pos.y<-8){ player.pos.set(0,2,0); player.vel.set(0,0,0); }
}

const AI_STATES = new Set(['idle','listen','sense','think','active']);
let aiState = 'idle';
let activeStateTimer = null;
function setAIState(next){
  if(!AI_STATES.has(next)) return;
  if(activeStateTimer){ clearTimeout(activeStateTimer); activeStateTimer=null; }
  aiState = next;
  aiBall.dataset.state = next;
  aiBall.setAttribute('aria-label', 'AI 助手：'+({idle:'待命',listen:'聆听',sense:'感知',think:'思考',active:'活跃'}[next]));
  if(window.__updateMonitor) window.__updateMonitor();
}
function setAIActive(duration=2400){
  setAIState('active');

}

function joyStart(t, rect){
  JOY.id = t.identifier;
  JOY.cx = rect.left + rect.width/2;
  JOY.cy = rect.top + rect.height/2;
  updateJoy(t.clientX, t.clientY);
}
function updateJoy(x,y){
  let dx = x-JOY.cx, dy = y-JOY.cy;
  const d = Math.hypot(dx,dy); const Rr = JOY.r;
  if(d>Rr){ dx = dx/d*Rr; dy = dy/d*Rr; }
  joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
  input.joyX = dx/Rr; input.joyY = dy/Rr;
}
function joyEnd(){ JOY.id=null; input.joyX=0; input.joyY=0; joyKnob.style.transform='translate(-50%,-50%)'; }

function lookStart(t){ LOOK.id = t.identifier; LOOK.lastX=t.clientX; LOOK.lastY=t.clientY; }
function lookMove(t){
  const dx = t.clientX-LOOK.lastX, dy = t.clientY-LOOK.lastY;
  LOOK.lastX=t.clientX; LOOK.lastY=t.clientY;
  const S=0.0055;
  player.yaw -= dx*S;
  player.pitch -= dy*S;
  const L = Math.PI/2 - 0.02;
  player.pitch = Math.max(-L, Math.min(L, player.pitch));
}
function lookEnd(){ LOOK.id=null; }

const HOME = ()=> ({ x: window.innerWidth - 60 - 22, y: 22 });

function aiStart(t){
  AI_DRAG.id = t.identifier;
  AI_DRAG.startX = t.clientX; AI_DRAG.startY = t.clientY;
  AI_DRAG.curX   = t.clientX; AI_DRAG.curY   = t.clientY;
  AI_DRAG.moved  = 0;
  AI_DRAG.startT = performance.now();
  AI_DRAG.active = false;
  AI_DRAG.listening = false;
  AI_DRAG.willTap= true;
  setAIState('idle');
  if(AI_DRAG.holdTimer){ clearTimeout(AI_DRAG.holdTimer); }
  AI_DRAG.holdTimer = setTimeout(()=>{
    AI_DRAG.holdTimer = null;
    if(AI_DRAG.id !== null && !AI_DRAG.active){
      AI_DRAG.listening = true;
      setAIState('listen');
      placeVoiceNearBall();
      voiceBubble.style.display='block';
      voiceTxt.textContent='正在聆听...';
      CHAT.pendingVoice = '';
      startVoice(text=>{ CHAT.pendingVoice = text; voiceTxt.textContent = text || '正在聆听...'; });
      if(navigator.vibrate) navigator.vibrate(20);
    }
  }, 500);
}
function activateAIDrag(){
  AI_DRAG.active = true;
  AI_DRAG.listening = true;
  AI_DRAG.willTap = false;
  setAIState('sense');
  if(navigator.vibrate) navigator.vibrate(30);
  closeChat(false);
  aiBall.style.transition='none';
  moveAIBallTo(AI_DRAG.curX, AI_DRAG.curY);
  dragCross.style.display='block';
  moveCrossTo(AI_DRAG.curX, AI_DRAG.curY);
  placeVoiceNearBall();
  voiceBubble.style.display='block';
  voiceTxt.textContent = CHAT.pendingVoice || '正在感知环境...';
  if(!recActive){
    CHAT.pendingVoice = '';
    startVoice(text=>{ CHAT.pendingVoice = text; voiceTxt.textContent = text || '正在感知环境...'; });
  }
  if(hintEl) hintEl.classList.add('hidden');
}
function aiMove(t){
  const dx = t.clientX-AI_DRAG.startX, dy = t.clientY-AI_DRAG.startY;
  const d = Math.hypot(dx,dy);
  if(d > AI_DRAG.moved) AI_DRAG.moved = d;
  AI_DRAG.curX = t.clientX; AI_DRAG.curY = t.clientY;
  if(!AI_DRAG.active){
    // Hold enters listen; moving while listening enters sense.
    if(AI_DRAG.listening && AI_DRAG.moved > 8){
      activateAIDrag();
    }
    return;
  }
  moveAIBallTo(t.clientX, t.clientY);
  moveCrossTo(t.clientX, t.clientY);
  if(voiceBubble.style.display==='block') placeVoiceNearBall();
}
function aiEnd(){
  const wasActive = AI_DRAG.active;
  const wasListening = AI_DRAG.listening;
  if(AI_DRAG.holdTimer){ clearTimeout(AI_DRAG.holdTimer); AI_DRAG.holdTimer=null; }
  AI_DRAG.active=false; AI_DRAG.listening=false; AI_DRAG.id=null;
  if(!wasActive){
    if(wasListening){
      voiceBubble.style.display='none';
      stopVoice();
      const heard = (CHAT.pendingVoice||'').trim();
      if(heard){
        openChat(false);
        chatText.value = heard;
        sendChatText();
      } else {
        setAIState('idle');
      }
    } else {
      toggleChat();
    }
    return;
  }
  dragCross.style.display='none';
  voiceBubble.style.display='none';
  blockLabel.style.display='none';
  highlightOutline.visible=false;
  highlightFill.visible=false;
  stopVoice();
  resetAIBallHome();
  setAIState('think');
  // Drag ended → open chat with proper card type
  const selType = CHAT.selectedType;
  const selPos  = CHAT.selectedPos;
  const voice   = (CHAT.pendingVoice||'').trim();
  openChat(false);
  if(!selType){
    // no block hit — treat like typed text
    if(voice){
      addUserMsg(voice);
      setAIState('think');
      const tid = addThinkingMsg();
      setTimeout(()=>{
        removeMsg(tid);
        setAIActive();
        // try guide match then fallback
        let done = false;
        for(const g of GUIDE_TEMPLATES){ if(g.re.test(voice)){ addAIMsg(buildGuideCardFromTemplate(g)); done=true; break; } }
        if(!done) addAIMsg(buildTextCard('我没识别到方块。你可以再拖到方块上，或直接输入问题。'));
        shakeYaw.length=0; shakePitch.length=0;
      }, 700+Math.random()*300);
    } else {
      setAIState('idle');
    }
    return;
  }
  const info = BLOCK_INFO[selType] || {name:selType};
  if(!voice){
    // Choice card
    addUserMsg('[选中 '+info.name+']');
    setChip(selType);
    CHAT.pendingBlockPos = selPos;
    setAIState('think');
    const tid = addThinkingMsg();
    setTimeout(()=>{
      removeMsg(tid);
      setAIActive(); aiBall.classList.add('has-history');
      addAIMsg(buildChoiceCard(selType));
      CHAT.state = 'output';
      shakeYaw.length=0; shakePitch.length=0;
    }, 700+Math.random()*300);
    return;
  }
  // Has both block + voice → route by intent
  addUserMsg('['+info.name+'] '+voice);
  setAIState('think');
  const thinkingId = addThinkingMsg();
  setTimeout(()=>{
    removeMsg(thinkingId);
    setAIActive();
    aiBall.classList.add('has-history');
    // guide template match
    let done = false;
    for(const g of GUIDE_TEMPLATES){ if(g.re.test(voice)){ addAIMsg(buildGuideCardFromTemplate(g)); done=true; break; } }
    if(!done){
      if(GUIDE_RE.test(voice) && !INFO_RE.test(voice)){
        addAIMsg(buildCollectGuideCard(selType));
      } else {
        addAIMsg(buildInfoCard(selType));
      }
    }
    CHAT.state = 'output';
    shakeYaw.length=0; shakePitch.length=0;
  }, 900 + Math.random()*300);
}

  else if(type==='log') src = T.logSide.image;
  else if(T[type] && T[type].image) src = T[type].image;
  else if(type==='dirt') src = T.dirt.image;
  const c = document.createElement('canvas'); c.width=64; c.height=64;

// Highlight keywords in text
function highlight(text, kws){
  if(!kws || !kws.length) return escapeHtml(text);
  let s = escapeHtml(text);
  for(const k of kws){
    const ek = escapeHtml(k);
    const re = new RegExp(ek.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&'), 'g');
    s = s.replace(re, '<span class="k">'+ek+'</span>');
  }
  return s;
}
function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  const dropsHtml = (bc.drops && bc.drops.length)
    ? bc.drops.map(d=>{
        const tc = makeThumb(d.type);
        return `<div class="drop"><div class="icon-wrap" data-t="${d.type}"><span class="count">×${d.count}</span></div><div class="lbl">${escapeHtml(d.name)}</div></div>`;
      }).join('')
    : '<div style="color:#78909c;font-size:11px;">无掉落物</div>';

    const first = w.firstChild;
    if(first && first.nodeType===1 && first.classList.contains('count')){

function buildCollectGuideCard(type){

             : '徒手或斧';
  const reason = `想要收集 ${info.name}，需要至少 ${tool} 才能开采。`;
  const reasonKw = [info.name, tool];
  const suggest = bc.loc ? `${bc.loc} 里可以找到 ${info.name}，靠近后使用 ${tool} 挖掘即可。` : `使用 ${tool} 挖掘即可。`;
  const suggestKw = [info.name, tool].concat(bc.locKw||[]);
  c.innerHTML = `

// Intent detection
const INFO_RE = /(是什么|什么东西|介绍|说说|是啥|干嘛|干什么|用来做什么|用途|作用|哪里找|在哪|哪里)/;
const GUIDE_RE = /(为什么|怎么|如何|帮我|教我|怎样)/;

// Open/close panel
function openChat(markActive=true){ if(window.__hideOverlays) window.__hideOverlays(); chatPanel.classList.add('open'); scrollChat(); if(markActive) setAIState('active'); }
function closeChat(resetState=true){ chatPanel.classList.remove('open'); if(resetState && !AI_DRAG.active && !chatMicActive) setAIState('idle'); }

  if(e.key==='Enter'){ e.preventDefault(); sendChatText(); }
});

});

function sendChatText(){
  const txt = chatText.value.trim();
  if(!txt && !CHAT.pendingBlock) return;
  chatText.value='';
  const boundType = CHAT.pendingBlock;
  const userLine = (boundType ? '['+((BLOCK_INFO[boundType]||{}).name||boundType)+'] ' : '') + (txt || '这是什么');
  addUserMsg(userLine);
  // route
  thinkThen(()=>{
    // 1. guidance match
    for(const g of GUIDE_TEMPLATES){
      if(g.re.test(txt)) { addAIMsg(buildGuideCardFromTemplate(g)); return; }
    }
    // 2. text has block reference or bound block
    let type = boundType;
    if(!type){
      // try match by name
      for(const k of Object.keys(BLOCK_INFO)){
        if(txt.indexOf(BLOCK_INFO[k].name) !== -1){ type = k; break; }
      }
    }
    if(type){
      // guide question about the block?
      if(GUIDE_RE.test(txt) && !INFO_RE.test(txt)){
        addAIMsg(buildCollectGuideCard(type));
      } else {
        addAIMsg(buildInfoCard(type));
      }
      return;
    }
    // 3. generic guide match
    if(GUIDE_RE.test(txt)){
      addAIMsg(buildTextCard('请具体说说你想做什么，比如"怎么合成工作台"或"晚上怪太多怎么办"。'));
      return;
    }
    // 4. fallback text
    addAIMsg(buildTextCard('我懂了。你可以拖我到任意方块上放开，我就能识别它；也可以直接问我 MC 相关的问题。'));
  });
  // keep chip until user clears it manually? clear after send
  clearChip();
}

let rec = null;

  try{

      let t='';
      for(let i=0;i<e.results.length;i++) t += e.results[i][0].transcript;
      if(recCallback) recCallback(t.trim());
    };
    rec.onerror = ()=>{};
    rec.onend = ()=>{
      recActive=false;
      if(recStateContext==='listen' && !AI_DRAG.listening && !chatMicActive){
        setAIState(chatPanel.classList.contains('open') ? 'active' : 'idle');
      }

  }catch(e){ rec=null; }
}
function startVoice(cb){
  recCallback = cb || null;
  recStateContext = AI_DRAG.active ? 'sense' : 'listen';
  setAIState(recStateContext);
  if(!rec){ if(cb) cb(''); return; }
  if(recActive) return;
  try{ rec.start(); recActive=true; }catch(e){}
}
function stopVoice(){
  recCallback = null;
  recStateContext = null;
  if(!rec || !recActive) return;
  try{ rec.stop(); }catch(e){}
  recActive=false;
}

function pointInside(el, x, y){
  if(!el || el.style.display==='none' && !el.classList.contains('open')) return false;
  const r = el.getBoundingClientRect();
  return x>=r.left && x<=r.right && y>=r.top && y<=r.bottom;
}

document.addEventListener('touchstart', e=>{
  for(const t of e.changedTouches){
    const target = t.target;
    if(target===joystick || joystick.contains(target)){
      if(JOY.id===null) joyStart(t, joystick.getBoundingClientRect());
    } else if(target===aiBall || aiBall.contains(target)){
      if(AI_DRAG.id===null && aiState!=='think') aiStart(t);
    } else if(target===jumpBtn){
      if(player.onGround){ player.vel.y = 8.4; player.onGround=false; }
    } else if(chatPanel.contains(target)){
      // Panel — let native scroll / input work. Do not preventDefault.
    } else if(loadingEl && loadingEl.contains(target)){
      // Loading overlay — let button click work.
    } else if(isDemoUI(target)){
      // 演示层 UI（模拟面板/气泡/卡片/菜单）— 放行原生点击
    } else {
      if(LOOK.id===null) lookStart(t);
    }
  }
  if(chatPanel.contains(e.target)) return;
  if(loadingEl && loadingEl.contains(e.target)) return;
  if(isDemoUI(e.target)) return;
  e.preventDefault();
},{passive:false});

// 演示层可点 UI：这些元素上的触摸交给浏览器原生点击，不当作转视角

    '#sim-toggle,#sim-panel,#proactive-bubble,#float-card,#ctx-menu'
  ));
}

const raycaster = new THREE.Raycaster();
raycaster.far = 16;
const ndc = new THREE.Vector2();

function raycastCrosshair(){
  const cx = parseFloat(dragCross.style.left);
  const cy = parseFloat(dragCross.style.top);
  ndc.x = (cx / window.innerWidth) * 2 - 1;
  ndc.y = -(cy / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObjects(blockMeshes, false);
  if(hits.length===0){
    CHAT.selectedType=null; CHAT.selectedPos=null;
    highlightOutline.visible=false; highlightFill.visible=false;
    blockLabel.style.display='none';
    return;
  }
  setAIState('sense');
  const h = hits[0];
  const type = h.object.userData.type;
  if(!type) return;
  const positions = h.object.userData.positions;
  const idx = h.instanceId;
  if(idx==null || !positions[idx]) return;
  const [x,y,z] = positions[idx];
  CHAT.selectedType = type;
  CHAT.selectedPos  = [x,y,z];
  highlightOutline.position.set(x+0.5, y+0.5, z+0.5);
  highlightFill.position.set(x+0.5, y+0.5, z+0.5);
  highlightOutline.visible=true; highlightFill.visible=true;
  const info = BLOCK_INFO[type];
  if(info){ blockLabel.textContent = info.name; blockLabel.style.display='block'; }
}

// ==============================================================
// Shake detection — used to close chat panel
// ==============================================================
const shakeYaw = [];
const shakePitch = [];
function pushShake(){
  const now = performance.now();
  shakeYaw.push({t:now, v:player.yaw});
  shakePitch.push({t:now, v:player.pitch});
  const cutoff = now - 700;
  while(shakeYaw.length   && shakeYaw[0].t   < cutoff) shakeYaw.shift();
  while(shakePitch.length && shakePitch[0].t < cutoff) shakePitch.shift();
}
function detectShake(arr){
  if(arr.length<4) return false;
  let crossings=0, totalAbs=0;
  for(let i=2;i<arr.length;i++){
    const d1 = arr[i-1].v - arr[i-2].v;
    const d2 = arr[i].v   - arr[i-1].v;
    if(d1*d2 < 0 && Math.abs(d1)>0.03 && Math.abs(d2)>0.03) crossings++;
    totalAbs += Math.abs(d2);
  }
  return crossings>=2 && totalAbs>0.5;
}

// ==============================================================
// Resize
// ==============================================================
function onResize(){
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
  if(!AI_DRAG.active) resetAIBallHome();
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', ()=> setTimeout(onResize,200));

// ==============================================================
// Main loop
// ==============================================================
const clock = new THREE.Clock();
let frames=0, fpsAcc=0;
function loop(){
  const dt = Math.min(0.05, clock.getDelta());
  const speed = 4.8;
  const forward = new THREE.Vector3(-Math.sin(player.yaw), 0, -Math.cos(player.yaw));
  const right   = new THREE.Vector3( Math.cos(player.yaw), 0, -Math.sin(player.yaw));
  const wish = new THREE.Vector3();
  wish.addScaledVector(forward, -input.joyY);
  wish.addScaledVector(right,    input.joyX);
  if(wish.lengthSq()>1) wish.normalize();
  const vx = wish.x*speed, vz = wish.z*speed;
  player.vel.y -= 22*dt;
  if(player.vel.y<-30) player.vel.y=-30;
  moveAndCollide(vx*dt, player.vel.y*dt, vz*dt);
  camera.position.set(player.pos.x, player.pos.y+player.eye, player.pos.z);
  camera.rotation.y = player.yaw;
  camera.rotation.x = player.pitch;
  sky.position.copy(camera.position);
  const sunDir = sun.position.clone().normalize();
  sunDisc.position.copy(camera.position).addScaledVector(sunDir, 140);
  sunGlow.position.copy(sunDisc.position);
  cloudGroup.position.x += dt*0.5;
  if(cloudGroup.position.x>60) cloudGroup.position.x -= 120;

  if(AI_DRAG.active) raycastCrosshair();

  pushShake();
  if(chatPanel.classList.contains('open') && !AI_DRAG.active && document.activeElement!==chatText){
    if(detectShake(shakeYaw) || detectShake(shakePitch)){
      closeChat();
      shakeYaw.length=0; shakePitch.length=0;
    }
  }

  renderer.render(scene, camera);
  frames++; fpsAcc+=dt;
  if(fpsAcc>0.5){ fpsEl.textContent = Math.round(frames/fpsAcc)+' fps'; frames=0; fpsAcc=0; }
  requestAnimationFrame(loop);
}

        actions:[
          {label:'标记', primary:true, fn:()=>{ showBubble('已标记 ⛏ 记得带对应等级的镐'); setTimeout(()=>closeBubble('idle'),1600); }},
          {label:'忽略', fn:()=>{ closeBubble('idle'); }},
        ]
      });
      return;
    }

    // ② 原地不动累计 → 卡住？主动搭话
    if(moved){ idleSec = 0; }
    else {
      idleSec++;
      if(idleSec >= 7){
        idleSec = 0; proactiveCooldown = 15;
        showBubble('在这待了一会儿了，需要我帮你看看接下来做什么吗？', {
          sense:true,
          actions:[
            {label:'好啊', primary:true, fn:()=>{
              setAIState('think');
              setTimeout(()=> showBubble('先补点食物，然后往东边找橡树砍木头做工具。', {
                actions:[{label:'知道了', primary:true, fn:()=>{ hideBubble(); setAIState('idle'); }}]
              }), 1100);
            }},
            {label:'不用', fn:()=>{ hideBubble(); setAIState('idle'); }},
          ]
        });
      }
    }
  }, 1000);

  // 找最近稀有矿（钻石/铁/煤），范围内才返回
  function nearestOre(){
    const RARE = { diamond:'钻石', iron:'铁', coal:'煤' };
    let best=null, bestD=6;   // 6格内
    for(const m of blockMeshes){
      const type = m.userData && m.userData.type;
      if(!RARE[type]) continue;
      const positions = m.userData.positions || [];
      for(const pos of positions){
        const d = Math.hypot(pos[0]-player.pos.x, pos[2]-player.pos.z);
        if(d < bestD){ bestD=d; best={ name:RARE[type], type }; }
      }
    }
    return best;
  }

  updateMonitor();
})();


</script>
